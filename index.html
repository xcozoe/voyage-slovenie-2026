<style>
  /* =========================================================
     RESET
     ========================================================= */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; -webkit-tap-highlight-color: transparent; }
  img, picture { display: block; max-width: 100%; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
  a { color: inherit; text-decoration: none; }
  ol, ul { list-style: none; }

  /* =========================================================
     PALETTE & TOKENS — Adriatique au crépuscule
     ========================================================= */
  :root {
    --bg: #0a3a44;
    --bg-deep: #062229;
    --bg-soft: #124852;

    --ink: #fbf6e9;
    --ink-soft: rgba(251, 246, 233, 0.78);
    --ink-faint: rgba(251, 246, 233, 0.52);
    --ink-mute: rgba(251, 246, 233, 0.32);

    --coral: #e98d58;
    --sand: #d4a574;
    --teal-light: #6cb6c4;
    --olive: #7a9657;

    --line: rgba(251, 246, 233, 0.10);
    --line-strong: rgba(251, 246, 233, 0.20);

    --fz-display: clamp(40px, 11vw, 64px);
    --fz-h1: clamp(28px, 7vw, 38px);
    --fz-h2: clamp(20px, 5vw, 24px);
    --fz-h3: 17px;
    --fz-body: 16px;
    --fz-small: 13px;
    --fz-micro: 11px;

    --gap-xs: 6px;
    --gap-sm: 12px;
    --gap-md: 20px;
    --gap-lg: 32px;
    --gap-xl: 56px;

    --pad-x: 22px;
    --max-w: 540px;

    --ease: cubic-bezier(.2, .65, .2, 1);
  }

  /* =========================================================
     BASE TYPO
     ========================================================= */
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: var(--fz-body);
    line-height: 1.55;
    min-height: 100vh;
    overflow-x: hidden;
    padding-bottom: env(safe-area-inset-bottom);
    -webkit-font-smoothing: antialiased;
  }
  .display, h1, h2, h3 { font-family: 'Fraunces', Georgia, serif; font-weight: 500; letter-spacing: -0.015em; }
  .italic { font-style: italic; }

  /* =========================================================
     APP SHELL
     ========================================================= */
  #app {
    max-width: var(--max-w);
    margin: 0 auto;
    min-height: 100vh;
    background: var(--bg);
    position: relative;
    isolation: isolate;
  }

  /* Page fade transition */
  .page { animation: page-in 380ms var(--ease) both; }
  @keyframes page-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* =========================================================
     DAY VIEW — IMMERSIVE
     ========================================================= */
  .day { padding-bottom: 56px; }

  /* HERO --------------------------------------------------- */
  .day__hero {
    position: relative;
    height: 78vh;
    min-height: 520px;
    width: 100%;
    overflow: hidden;
    background: var(--bg-deep);
  }
  .day__photo,
  .day__photo img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .day__photo img {
    animation: hero-zoom 14s var(--ease) both;
  }
  @keyframes hero-zoom {
    from { transform: scale(1.06); }
    to   { transform: scale(1); }
  }
  .day__hero::before,
  .day__hero::after {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    pointer-events: none;
    z-index: 1;
  }
  .day__hero::before {
    top: 0;
    height: 35%;
    background: linear-gradient(180deg, rgba(6, 34, 41, 0.65) 0%, rgba(6, 34, 41, 0) 100%);
  }
  .day__hero::after {
    bottom: 0;
    height: 75%;
    background: linear-gradient(180deg,
      rgba(10, 58, 68, 0) 0%,
      rgba(10, 58, 68, 0.35) 30%,
      rgba(10, 58, 68, 0.85) 70%,
      var(--bg) 100%);
  }

  /* HERO TOP BAR (back + day index) */
  .day__topbar {
    position: absolute;
    top: calc(env(safe-area-inset-top, 0px) + 14px);
    left: 0;
    right: 0;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--pad-x);
  }
  .day__back,
  .day__counter {
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.85;
    padding: 8px 0;
  }
  .day__back { display: inline-flex; align-items: center; gap: 8px; }
  .day__back::before { content: '←'; font-size: 14px; letter-spacing: 0; }

  /* HERO TEXT (bottom of hero) */
  .day__hero-text {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 2;
    padding: 0 var(--pad-x) 38px;
  }
  .day__leg {
    font-size: var(--fz-micro);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--coral);
    margin-bottom: 14px;
    font-weight: 500;
  }
  .day__leg::after {
    content: '';
    display: inline-block;
    width: 24px;
    height: 1px;
    background: var(--coral);
    vertical-align: middle;
    margin-left: 10px;
    transform: translateY(-2px);
  }
  .day__title {
    font-size: var(--fz-display);
    font-style: italic;
    font-weight: 500;
    line-height: 1.02;
    color: var(--ink);
    margin-bottom: 14px;
    text-wrap: balance;
  }
  .day__date {
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-small);
    color: var(--ink-soft);
    letter-spacing: 0.02em;
  }
  .day__date strong { color: var(--ink); font-weight: 500; }

  /* BODY --------------------------------------------------- */
  .day__body {
    position: relative;
    z-index: 2;
    padding: 0 var(--pad-x);
    margin-top: -8px;
  }
  .day__body > section + section { margin-top: var(--gap-xl); }

  .section-title {
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--coral);
    margin-bottom: 20px;
  }

  /* INTRO -------------------------------------------------- */
  .day__intro {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 19px;
    line-height: 1.5;
    color: var(--ink);
    padding: 4px 0 0;
    text-wrap: pretty;
  }
  .day__intro::first-letter {
    font-size: 1.4em;
    line-height: 1;
  }

  /* DRIVE -------------------------------------------------- */
  .drive {
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    padding: 22px 0;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 14px;
  }
  .drive__city {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 17px;
    color: var(--ink);
  }
  .drive__city--to { text-align: right; }
  .drive__arrow {
    color: var(--coral);
    font-size: 14px;
    letter-spacing: 0.2em;
  }
  .drive__stats {
    grid-column: 1 / -1;
    text-align: center;
    font-size: var(--fz-micro);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-top: 6px;
  }

  /* SCHEDULE ----------------------------------------------- */
  .schedule { display: flex; flex-direction: column; gap: var(--gap-lg); }
  .schedule__item {
    position: relative;
    padding-left: 0;
  }
  .schedule__time {
    display: inline-block;
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--sand);
    margin-bottom: 10px;
  }
  .schedule__title {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 500;
    font-style: italic;
    color: var(--ink);
    margin-bottom: 8px;
    line-height: 1.2;
    text-wrap: balance;
  }
  .schedule__desc {
    color: var(--ink-soft);
    font-size: 15.5px;
    line-height: 1.6;
    text-wrap: pretty;
  }

  /* STAY CARD ---------------------------------------------- */
  .stay {
    position: relative;
    display: block;
    border: 1px solid var(--line-strong);
    border-radius: 4px;
    padding: 22px;
    padding-right: 40px;
    background: rgba(251, 246, 233, 0.03);
    color: var(--ink);
    text-decoration: none !important;
    transition: background 200ms var(--ease), border-color 200ms var(--ease);
  }
  .stay:active {
    background: rgba(251, 246, 233, 0.06);
    border-color: var(--coral);
  }
  .stay::after {
    content: '→';
    position: absolute;
    top: 22px;
    right: 18px;
    color: var(--ink-faint);
    font-size: 18px;
    line-height: 1;
  }
  .stay__status {
    display: inline-block;
    font-size: var(--fz-micro);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 12px;
    font-weight: 600;
  }
  .stay--confirmed .stay__status { color: var(--olive); }
  .stay--tbd       .stay__status { color: var(--coral); }
  .stay__name {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 22px;
    line-height: 1.2;
    margin-bottom: 6px;
    color: var(--ink);
  }
  .stay__city {
    font-size: var(--fz-small);
    color: var(--ink-faint);
    margin-bottom: 14px;
  }
  .stay__meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 18px;
    margin: 14px 0 0;
    padding-top: 14px;
    border-top: 1px solid var(--line);
  }
  .stay__meta dt {
    font-size: var(--fz-micro);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 2px;
  }
  .stay__meta dd { font-size: 14px; color: var(--ink-soft); }
  .stay__notes {
    margin-top: 14px;
    font-size: 14px;
    color: var(--ink-soft);
    font-style: italic;
    line-height: 1.55;
  }
  .stay__actions {
    margin-top: 18px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .action {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 14px;
    border: 1px solid var(--line-strong);
    border-radius: 999px;
    font-size: 13px;
    color: var(--ink);
    transition: background 200ms var(--ease), border-color 200ms var(--ease);
  }
  .action:active { background: rgba(251, 246, 233, 0.08); border-color: var(--coral); }
  .action__icon { font-size: 14px; }
  .action--accent {
    background: var(--coral);
    border-color: var(--coral);
    color: var(--bg-deep);
    font-weight: 700;
  }
  .action--accent:active { opacity: 0.88; }
  /* Boutons marque hébergements */
  .action--airbnb {
    background: #FF5A5F;
    border-color: #FF5A5F;
    color: #ffffff;
    font-weight: 700;
  }
  .action--booking {
    background: #003B95;
    border-color: #003B95;
    color: #ffffff;
    font-weight: 700;
  }
  .action--website {
    background: transparent;
    border-color: var(--line-strong);
    color: var(--ink);
  }
  .action--airbnb:active,
  .action--booking:active { opacity: 0.88; }

  /* NOTES (par jour) --------------------------------------- */
  .notes {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .notes__loader,
  .notes__empty {
    font-family: 'Fraunces', serif;
    font-style: italic;
    color: var(--ink-faint);
    font-size: 14px;
    padding: 4px 0;
  }
  .note {
    background: rgba(212, 165, 116, 0.08);
    border-left: 2px solid var(--sand);
    padding: 14px 16px;
    border-radius: 0 4px 4px 0;
  }
  .note__text {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 15.5px;
    line-height: 1.55;
    color: var(--ink);
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .note__meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid rgba(251, 246, 233, 0.08);
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    font-weight: 500;
  }
  .note__edit {
    color: var(--ink-faint);
    padding: 4px 8px;
    border-radius: 4px;
    font-size: var(--fz-micro);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 600;
    transition: background 200ms var(--ease), color 200ms var(--ease);
  }
  .note__edit:active { background: rgba(251, 246, 233, 0.08); color: var(--ink); }

  .note--editing {
    background: rgba(251, 246, 233, 0.04);
    border-left: 2px solid var(--coral);
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .note__textarea {
    width: 100%;
    resize: none;
    background: rgba(251, 246, 233, 0.06);
    border: 1px solid var(--line-strong);
    border-radius: 4px;
    color: var(--ink);
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 15px;
    line-height: 1.5;
    padding: 12px;
    min-height: 100px;
    overflow: hidden;
  }
  .note__textarea:focus { outline: none; border-color: var(--coral); }
  .note__edit-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .note__btn {
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 9px 14px;
    border-radius: 999px;
    border: 1px solid var(--line-strong);
    color: var(--ink-soft);
    transition: background 180ms var(--ease);
  }
  .note__btn:active { background: rgba(251, 246, 233, 0.08); }
  .note__btn--save {
    background: var(--coral);
    border-color: var(--coral);
    color: var(--ink);
  }
  .note__btn--danger {
    color: var(--coral);
    border-color: rgba(233, 141, 88, 0.4);
  }
  .note-add {
    align-self: flex-start;
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--coral);
    padding: 10px 0;
  }

  /* TIPS --------------------------------------------------- */
  .tips { display: flex; flex-direction: column; gap: 12px; }
  .tips li {
    position: relative;
    padding-left: 22px;
    color: var(--ink-soft);
    font-size: 15px;
    line-height: 1.55;
  }
  .tips li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0.7em;
    width: 12px;
    height: 1px;
    background: var(--coral);
  }

  /* =========================================================
     COVER — immersive
     ========================================================= */
  .cover {
    position: relative;
    min-height: 100vh;
    min-height: 100dvh;
    width: 100%;
    overflow: hidden;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }
  .cover__photo,
  .cover__photo img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .cover__photo img { animation: hero-zoom 22s var(--ease) both; }

  /* Gradient allégé : juste assez pour la lisibilité, sans écraser la photo */
  .cover::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 1;
    background:
      radial-gradient(ellipse 80% 60% at 30% 55%, rgba(233, 141, 88, 0.18) 0%, transparent 60%),
      linear-gradient(180deg,
        rgba(6, 34, 41, 0.30) 0%,
        rgba(6, 34, 41, 0.05) 22%,
        rgba(6, 34, 41, 0.05) 50%,
        rgba(6, 34, 41, 0.55) 92%,
        rgba(6, 34, 41, 0.75) 100%);
  }

  .cover__top,
  .cover__main,
  .cover__bottom { position: relative; z-index: 2; }

  .cover__top {
    padding: calc(env(safe-area-inset-top, 0px) + 22px) var(--pad-x) 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: var(--fz-micro);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink);
    font-weight: 600;
    text-shadow: 0 1px 12px rgba(6, 34, 41, 0.5);
  }
  .cover__countdown {
    color: var(--sand);
    background: rgba(6, 34, 41, 0.35);
    padding: 6px 12px;
    border-radius: 999px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  /* Texte au tiers supérieur — la photo respire en dessous */
  .cover__main {
    align-self: start;
    padding: 14vh var(--pad-x) 0;
    text-shadow: 0 2px 24px rgba(6, 34, 41, 0.45);
  }
  .cover__kicker {
    font-size: var(--fz-micro);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--sand);
    margin-bottom: 22px;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }
  .cover__kicker::before,
  .cover__kicker::after {
    content: '';
    width: 22px;
    height: 1px;
    background: var(--sand);
  }
  .cover__title {
    font-family: 'Fraunces', serif;
    font-size: clamp(76px, 23vw, 138px);
    font-style: italic;
    font-weight: 500;
    line-height: 0.92;
    letter-spacing: -0.03em;
    margin-bottom: 24px;
    color: var(--ink);
  }
  .cover__subtitle {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 22px;
    line-height: 1.3;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .cover__meta {
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-small);
    color: var(--ink);
    letter-spacing: 0.04em;
    opacity: 0.92;
  }

  .cover__bottom {
    padding: 28px var(--pad-x) calc(env(safe-area-inset-bottom, 0px) + 30px);
    display: flex;
    flex-direction: column;
    gap: 20px;
    align-items: stretch;
  }
  .cover__cta {
    display: inline-flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 26px;
    border-radius: 999px;
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-small);
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink);
    background: var(--coral);
    box-shadow: 0 8px 28px rgba(233, 141, 88, 0.35), 0 1px 0 rgba(255, 255, 255, 0.15) inset;
    transition: transform 180ms var(--ease), box-shadow 180ms var(--ease);
  }
  .cover__cta::after {
    content: '→';
    font-size: 18px;
    letter-spacing: 0;
    transition: transform 220ms var(--ease);
  }
  .cover__cta:active {
    transform: scale(0.98);
    box-shadow: 0 4px 18px rgba(233, 141, 88, 0.40);
  }
  .cover__cta:hover::after { transform: translateX(3px); }

  .cover__links {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px 28px;
    width: 100%;
    max-width: 360px;
    margin: 0 auto;
    text-align: center;
    font-size: var(--fz-micro);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .cover__links a {
    color: var(--ink);
    opacity: 0.8;
    padding: 8px 2px;
    border-bottom: 1px solid transparent;
    transition: opacity 200ms var(--ease), border-color 200ms var(--ease);
    white-space: nowrap;
  }
  .cover__links a:active {
    opacity: 1;
    border-bottom-color: var(--sand);
  }

  /* Lien « À faire » : pleine largeur, badge notif intégré */
  .cover__link-todo {
    position: relative;
    grid-column: 1 / -1;
    margin-top: 4px;
    padding-top: 14px !important;
    border-top: 1px solid var(--line);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .cover__badge {
    position: static;
    min-width: 22px;
    height: 22px;
    padding: 0 7px;
    border-radius: 999px;
    background: var(--coral);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 700;
    line-height: 22px;
    text-align: center;
    letter-spacing: 0;
    text-transform: none;
    box-shadow: 0 2px 10px rgba(233, 141, 88, 0.55);
  }

  /* Staggered fade-in */
  .stagger > * {
    opacity: 0;
    animation: stagger-in 700ms var(--ease) forwards;
  }
  .stagger > *:nth-child(1) { animation-delay: 250ms; }
  .stagger > *:nth-child(2) { animation-delay: 400ms; }
  .stagger > *:nth-child(3) { animation-delay: 550ms; }
  .stagger > *:nth-child(4) { animation-delay: 700ms; }
  .stagger > *:nth-child(5) { animation-delay: 850ms; }
  @keyframes stagger-in {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* =========================================================
     TIMELINE — éditoriale
     ========================================================= */
  .timeline {
    padding: calc(env(safe-area-inset-top, 0px) + 28px) 0 110px;
  }
  .timeline__head {
    padding: 0 var(--pad-x) 8px;
  }
  .timeline__back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: var(--fz-micro);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 22px;
    padding: 8px 0;
  }
  .timeline__back::before { content: '←'; letter-spacing: 0; }
  .timeline__kicker {
    font-size: var(--fz-micro);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--coral);
    margin-bottom: 14px;
    font-weight: 600;
  }
  .timeline__title {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: clamp(44px, 12vw, 64px);
    line-height: 0.98;
    letter-spacing: -0.025em;
    margin-bottom: 18px;
  }
  .timeline__title em {
    font-style: italic;
    color: var(--sand);
  }
  .timeline__lead {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 17px;
    color: var(--ink-soft);
    line-height: 1.4;
  }

  .timeline__leg {
    padding: 38px var(--pad-x) 18px;
    display: flex;
    align-items: center;
    gap: 16px;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 16px;
    color: var(--sand);
    letter-spacing: 0.02em;
  }
  .timeline__leg::before,
  .timeline__leg::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line-strong);
  }

  .timeline__day {
    display: block;
    margin-bottom: 36px;
    color: var(--ink);
  }
  .timeline__photo {
    position: relative;
    width: 100%;
    aspect-ratio: 4 / 3;
    overflow: hidden;
    background: var(--bg-deep);
  }
  .timeline__photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 800ms var(--ease);
  }
  .timeline__day:active .timeline__photo img { transform: scale(1.03); }
  .timeline__photo::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: linear-gradient(180deg, rgba(6, 34, 41, 0.30) 0%, transparent 35%, transparent 70%, rgba(6, 34, 41, 0.45) 100%);
  }
  .timeline__num {
    position: absolute;
    top: 14px;
    left: 14px;
    z-index: 1;
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    letter-spacing: 0.22em;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--ink);
    background: rgba(6, 34, 41, 0.40);
    padding: 7px 12px;
    border-radius: 999px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .timeline__caption {
    padding: 16px var(--pad-x) 0;
  }
  .timeline__date {
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--coral);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .timeline__day-title {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 26px;
    line-height: 1.1;
    color: var(--ink);
    margin-bottom: 8px;
    text-wrap: balance;
  }
  .timeline__sub {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 14px;
    font-size: 14px;
    color: var(--ink-soft);
  }
  .timeline__sub-text {
    font-style: italic;
    font-family: 'Fraunces', serif;
    font-size: 15px;
    flex: 1;
    min-width: 0;
  }
  .timeline__drive {
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .timeline__drive--rest { color: var(--olive); }

  /* =========================================================
     STAYS — éditoriale, plein écran avec scroll-snap
     ========================================================= */
  .stays {
    height: 100vh;
    height: 100dvh;
    overflow-y: auto;
    scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .stays::-webkit-scrollbar { display: none; }

  .stays__head {
    scroll-snap-align: start;
    min-height: 100dvh;
    padding: calc(env(safe-area-inset-top, 0px) + 28px) var(--pad-x) 32px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .stays__summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    margin: 32px 0 0;
    border-top: 1px solid var(--line-strong);
    border-bottom: 1px solid var(--line-strong);
  }
  .stays__summary > div {
    padding: 16px 8px;
    text-align: center;
    border-right: 1px solid var(--line);
  }
  .stays__summary > div:last-child { border-right: 0; }
  .stays__summary dt {
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .stays__summary dd {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 22px;
    color: var(--ink);
    line-height: 1;
  }
  .stays__summary dd small {
    font-size: 13px;
    color: var(--ink-faint);
    margin-left: 2px;
    font-style: italic;
  }

  .stays__list {
    display: flex;
    flex-direction: column;
  }

  /* STAY CARD (page hébergements) — pleine viewport avec snap */
  .stay-card {
    position: relative;
    scroll-snap-align: start;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    color: var(--ink);
    transition: outline-color 600ms var(--ease);
    outline: 2px solid transparent;
    outline-offset: -8px;
  }
  .stay-card__back {
    position: absolute;
    top: calc(env(safe-area-inset-top, 0px) + 12px);
    left: calc(env(safe-area-inset-left, 0px) + 14px);
    z-index: 3;
    width: 38px;
    height: 38px;
    display: grid;
    place-items: center;
    border-radius: 50%;
    background: rgba(6, 34, 41, 0.55);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    color: var(--ink);
    font-size: 20px;
    line-height: 1;
    border: 1px solid var(--line);
    transition: background 200ms var(--ease);
  }
  .stay-card__back:active { background: rgba(6, 34, 41, 0.78); }
  .stay-card--focused { outline-color: var(--coral); }

  .stay-card__photo {
    display: block;
    position: relative;
    width: 100%;
    flex: 0 0 48%;
    min-height: 0;
    overflow: hidden;
    background: var(--bg-deep);
  }
  .stay-card__photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .stay-card__photo::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: linear-gradient(180deg, rgba(6,34,41,0.30) 0%, transparent 35%, transparent 65%, rgba(6,34,41,0.55) 100%);
  }
  .stay-card__nights {
    position: absolute;
    bottom: 14px;
    right: 14px;
    z-index: 2;
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--ink);
    background: rgba(6, 34, 41, 0.55);
    padding: 7px 13px;
    border-radius: 999px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--line);
  }
  .stay-card__status {
    position: absolute;
    bottom: 14px;
    left: 14px;
    z-index: 1;
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 600;
    padding: 7px 13px;
    border-radius: 999px;
    border: 1px solid transparent;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .stay-card--confirmed .stay-card__status {
    color: #fbf6e9;
    background: rgba(122, 150, 87, 0.85);
  }
  .stay-card--tbd .stay-card__status {
    color: var(--bg-deep);
    background: rgba(233, 141, 88, 0.92);
  }
  .stay-card__city-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
    min-height: 26px;
  }
  .stay-card__city-row .stay-card__city {
    line-height: 1;
    margin: 0;
  }
  .stay-card__city-row .stay-card__listing {
    line-height: 1;
  }
  .stay-card__listing {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 5px 11px;
    border-radius: 999px;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 700;
    text-decoration: none !important;
    border: 1px solid transparent;
    flex-shrink: 0;
    transition: opacity 180ms var(--ease), transform 180ms var(--ease);
  }
  .stay-card__listing:active { opacity: 0.85; transform: scale(0.97); }
  .stay-card__listing.is-airbnb  { background: #FF5A5F; color: #ffffff !important; }
  .stay-card__listing.is-booking { background: #003B95; color: #ffffff !important; }
  .stay-card__listing.is-website {
    background: rgba(251, 246, 233, 0.10);
    color: var(--ink) !important;
    border-color: var(--line);
  }

  .stay-card__body {
    flex: 1 1 auto;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 18px var(--pad-x) 28px;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }
  .stay-card__city {
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--coral);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .stay-card__name {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 24px;
    line-height: 1.15;
    color: var(--ink);
    margin-bottom: 6px;
    text-wrap: balance;
  }
  .stay-card__dates {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--ink-soft);
  }

  .stay-card__meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 18px;
    margin: 18px 0 0;
    padding: 18px 0 0;
    border-top: 1px solid var(--line);
  }
  .stay-card__meta-full { grid-column: 1 / -1; }
  .stay-card__link {
    color: var(--coral);
    text-decoration: underline;
    text-decoration-color: rgba(233, 141, 88, 0.4);
    text-underline-offset: 2px;
  }
  .stay-card__link-block {
    display: inline-block;
    line-height: 1.4;
  }
  .stay-card__link-arrow {
    color: var(--coral);
    margin-left: 6px;
    font-size: 11px;
    letter-spacing: 0;
  }
  .stay-card__meta dt {
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 3px;
    font-weight: 500;
  }
  .stay-card__meta dd {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.4;
  }

  .stay-card__booking {
    display: flex;
    width: 100%;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    margin-top: auto;
    padding: 14px 16px;
    background: rgba(212, 165, 116, 0.10);
    border: 1px solid var(--line);
    border-radius: 8px;
    text-align: left;
    color: var(--ink);
    transition: background 200ms var(--ease), border-color 200ms var(--ease);
  }
  .stay-card__booking:active {
    background: rgba(212, 165, 116, 0.18);
    border-color: rgba(212, 165, 116, 0.45);
  }
  .stay-card__booking-text { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .stay-card__booking-label {
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--coral);
    font-weight: 600;
  }
  .stay-card__booking-summary {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 17px;
    color: var(--ink);
  }
  .stay-card__booking-arrow {
    color: var(--ink-faint);
    font-size: 22px;
    line-height: 1;
    flex-shrink: 0;
  }

  .stay-card__notes {
    margin-top: 14px;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 14.5px;
    color: var(--ink-soft);
    line-height: 1.55;
  }

  .stay-card__actions {
    margin-top: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* =========================================================
     ACTIVITÉS — programme par jour (initialisation)
     ========================================================= */
  .activities {
    padding: calc(env(safe-area-inset-top, 0px) + 28px) 0 110px;
  }
  .activities__head { padding: 0 var(--pad-x) 8px; }

  .activities__list {
    display: flex;
    flex-direction: column;
    gap: 38px;
    margin-top: 32px;
  }
  .activities__day {
    padding: 0 var(--pad-x);
  }
  .activities__day-head {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 6px;
  }
  .activities__day-num {
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--coral);
    font-weight: 600;
  }
  .activities__day-date {
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .activities__day-title {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 24px;
    line-height: 1.15;
    margin-bottom: 18px;
    text-wrap: balance;
  }
  .activities__day-title a {
    color: var(--ink);
    border-bottom: 1px solid transparent;
    transition: border-color 200ms var(--ease);
  }
  .activities__day-title a:active { border-bottom-color: var(--coral); }

  .activities__items {
    display: flex;
    flex-direction: column;
    gap: 20px;
    border-left: 1px solid var(--line);
    padding-left: 18px;
  }
  .activities__item {
    position: relative;
  }
  .activities__item::before {
    content: '';
    position: absolute;
    left: -22px;
    top: 9px;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--sand);
  }
  .activities__item-time {
    display: inline-block;
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--sand);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .activities__item-title {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 17px;
    line-height: 1.25;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .activities__item-desc {
    font-size: 14px;
    line-height: 1.55;
    color: var(--ink-soft);
  }

  /* =========================================================
     BOTTOM SHEET — détail réservation
     ========================================================= */
  .sheet-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(6, 34, 41, 0.62);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 500;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    animation: sheet-fade 220ms var(--ease);
  }
  .sheet-backdrop.is-closing {
    animation: sheet-fade 200ms var(--ease) reverse;
    pointer-events: none;
  }
  @keyframes sheet-fade {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  body.sheet-open { overflow: hidden; }
  body.sheet-open .stays { overflow: hidden; }

  .sheet {
    position: relative;
    width: 100%;
    max-width: var(--max-w);
    max-height: 85dvh;
    background: var(--bg-soft);
    border-radius: 18px 18px 0 0;
    padding: 22px var(--pad-x) calc(env(safe-area-inset-bottom, 0px) + 30px);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    animation: sheet-up 320ms cubic-bezier(.2, .65, .2, 1);
    box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.5);
    color: var(--ink);
  }
  .is-closing .sheet { animation: sheet-up 220ms var(--ease) reverse; }
  @keyframes sheet-up {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .sheet__handle {
    width: 48px;
    height: 5px;
    border-radius: 999px;
    background: rgba(251, 246, 233, 0.30);
    margin: 0 auto 18px;
    cursor: grab;
    touch-action: none;
  }
  .sheet__handle-zone {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 36px;
    cursor: grab;
    touch-action: none;
  }
  .sheet__handle-zone:active { cursor: grabbing; }
  .sheet__close {
    position: absolute;
    top: 12px;
    right: 14px;
    width: 36px;
    height: 36px;
    display: grid;
    place-items: center;
    border-radius: 50%;
    background: rgba(251, 246, 233, 0.16);
    color: var(--ink);
    font-size: 22px;
    line-height: 1;
    border: 1px solid var(--line);
    z-index: 2;
    transition: background 180ms var(--ease);
  }
  .sheet__close:active { background: rgba(251, 246, 233, 0.28); }
  .sheet__head { padding-right: 36px; margin-bottom: 22px; }
  .sheet__kicker {
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--coral);
    font-weight: 600;
    margin-bottom: 10px;
  }
  .sheet__title {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 24px;
    line-height: 1.15;
    margin-bottom: 6px;
    text-wrap: balance;
  }
  .sheet__sub {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--ink-soft);
  }

  .sheet__details {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin: 0;
    padding: 16px 0;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .sheet__details > div {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 16px;
  }
  .sheet__details dt {
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    font-weight: 600;
    flex-shrink: 0;
  }
  .sheet__details dd {
    font-size: 14px;
    color: var(--ink);
    text-align: right;
    margin: 0;
    word-break: break-word;
  }

  .sheet__total {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 18px;
    padding: 6px 0 14px;
  }
  .sheet__total span {
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-faint);
    font-weight: 600;
  }
  .sheet__total strong {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 30px;
    color: var(--ink);
  }

  .sheet__payments {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 6px;
  }
  .sheet__payment {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 16px;
    border-radius: 8px;
    background: rgba(251, 246, 233, 0.04);
  }
  .sheet__payment.is-paid {
    background: rgba(122, 150, 87, 0.14);
    border-left: 3px solid var(--olive);
  }
  .sheet__payment.is-due {
    background: rgba(233, 141, 88, 0.12);
    border-left: 3px solid var(--coral);
  }
  .sheet__payment.is-info {
    background: rgba(212, 165, 116, 0.10);
    border-left: 3px solid var(--sand);
  }
  .sheet__payment-icon {
    font-size: 18px;
    width: 22px;
    text-align: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .sheet__payment-main {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 17px;
    color: var(--ink);
    line-height: 1.3;
  }
  .sheet__payment small {
    display: block;
    margin-top: 4px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.06em;
  }
  .sheet__listing {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 22px;
    padding: 14px 20px;
    border-radius: 999px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    text-decoration: none !important;
    transition: opacity 180ms var(--ease);
  }
  .sheet__listing:active { opacity: 0.88; }
  .sheet__listing--airbnb  { background: #FF5A5F; color: #ffffff !important; }
  .sheet__listing--booking { background: #003B95; color: #ffffff !important; }
  .sheet__listing--website {
    background: transparent;
    color: var(--ink) !important;
    border: 1px solid var(--line-strong);
  }

  /* =========================================================
     CARTE — Leaflet intégré
     ========================================================= */
  .map-view {
    /* fixed pour s'affranchir du max-width du #app conteneur,
       sinon en landscape on resterait borné à 540 px de large */
    position: fixed;
    inset: 0;
    background: var(--bg-deep);
    overflow: hidden;
    z-index: 200;
  }
  .leaflet-map {
    width: 100%;
    height: 100%;
    background: var(--bg-deep);
    position: relative;
  }
  .map-back,
  .map-external {
    position: absolute;
    top: calc(env(safe-area-inset-top, 0px) + 12px);
    z-index: 1000;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-radius: 999px;
    background: rgba(6, 34, 41, 0.82);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 600;
    border: 1px solid var(--line);
  }
  .map-back  { left: calc(env(safe-area-inset-left, 0px) + 12px); }
  .map-external { right: calc(env(safe-area-inset-right, 0px) + 12px); }
  .map-back::before { content: '←'; letter-spacing: 0; font-size: 14px; }
  .map-external { color: var(--coral); border-color: rgba(233, 141, 88, 0.4); }
  .map-loader {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    color: var(--ink-faint);
    font-size: var(--fz-small);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-style: italic;
  }
  /* Marqueur étape avec lettre — stays */
  .stay-pin { background: transparent; border: none; }
  .stay-pin__inner {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: #fbf6e9;
    background: #7a9657;
    border: 2px solid #fbf6e9;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.45);
  }
  .stay-pin__inner.is-tbd {
    border-style: dashed;
    opacity: 0.92;
  }

  /* Tweaks Leaflet pour s'intégrer au thème sombre */
  .leaflet-container { background: var(--bg-deep); }

  /* Popups premium — dark theme + footer sticky.
     Leaflet écrase certains styles via sa feuille CDN, d'où !important. */
  .leaflet-popup-content-wrapper {
    padding: 0 !important;
    border-radius: 12px !important;
    background: var(--bg-soft) !important;
    color: var(--ink) !important;
    box-shadow: 0 16px 50px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(251, 246, 233, 0.07) !important;
    overflow: hidden;
  }
  .leaflet-popup-content {
    margin: 0 !important;
    width: auto !important;
    font-size: 13px;
    line-height: 1.5;
  }
  .leaflet-popup-tip { background: var(--bg-soft) !important; }
  .leaflet-popup-close-button {
    color: var(--ink) !important;
    opacity: 0.55;
    z-index: 5;
    width: 28px !important;
    height: 28px !important;
    font-size: 22px !important;
    padding: 0 !important;
    top: 6px !important;
    right: 6px !important;
  }
  .leaflet-popup-close-button:hover { opacity: 1; }

  .pop-card {
    display: flex;
    flex-direction: column;
    width: 290px;
    max-width: 86vw;
    max-height: 80dvh;
  }
  .pop-card--compact { width: 250px; }

  .pop-header {
    flex-shrink: 0;
    padding: 18px 22px 14px 18px;
    background: linear-gradient(180deg, rgba(233, 141, 88, 0.14) 0%, transparent 100%);
    border-bottom: 1px solid var(--line);
  }
  .pop-stage-line {
    display: flex;
    align-items: baseline;
    gap: 10px 14px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .pop-stage {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--coral);
  }
  .pop-stage-dates {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1;
  }
  .pop-name {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 20px;
    line-height: 1.15;
    color: var(--ink);
    margin: 0 0 4px;
    text-wrap: balance;
  }
  .pop-name--small { font-size: 17px; }
  .pop-city {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: var(--ink-faint);
    font-weight: 600;
  }

  .pop-body {
    flex: 1;
    overflow-y: auto;
    padding: 14px 18px 16px;
    -webkit-overflow-scrolling: touch;
  }
  .pop-card--compact .pop-body { padding: 16px 18px 14px; }

  .pop-details {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px 16px;
    margin: 0;
  }
  .pop-detail { margin: 0; min-width: 0; }
  .pop-detail--full { grid-column: 1 / -1; }
  .pop-detail dt {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-mute);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .pop-detail dd {
    font-size: 13px;
    color: var(--ink);
    margin: 0;
    line-height: 1.4;
  }

  .pop-notes {
    margin-top: 14px;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--ink-soft);
  }
  .pop-card--compact .pop-notes { margin-top: 8px; }

  .pop-footer {
    flex-shrink: 0;
    padding: 12px 14px;
    background: rgba(251, 246, 233, 0.04);
    border-top: 1px solid var(--line);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .pop-link {
    color: var(--coral) !important;
    text-decoration: underline;
    text-decoration-color: rgba(233, 141, 88, 0.4);
    text-underline-offset: 2px;
  }
  .pop-link-card {
    display: inline-block;
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--coral) !important;
    text-decoration: none !important;
    width: 100%;
  }
  .pop-btn {
    flex: 1;
    display: inline-flex !important;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 11px 14px;
    border-radius: 999px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    text-decoration: none !important;
    white-space: nowrap;
    min-width: 0;
    transition: opacity 180ms var(--ease), transform 180ms var(--ease);
  }
  .pop-btn:active { opacity: 0.88; transform: scale(0.98); }

  /* Y aller — corail */
  .pop-btn--primary {
    background: var(--coral);
    color: var(--bg-deep) !important;
    box-shadow: 0 2px 10px rgba(233, 141, 88, 0.35);
  }
  /* Boutons marques */
  .pop-btn--airbnb {
    background: #FF5A5F;
    color: #ffffff !important;
  }
  .pop-btn--booking {
    background: #003B95;
    color: #ffffff !important;
  }
  .pop-btn--website {
    background: transparent;
    color: var(--ink) !important;
    border: 1px solid var(--line-strong);
  }
  .pop-btn__icon { font-size: 13px; line-height: 1; }

  /* Landscape : header & footer compacts pour laisser de la place au body */
  @media (max-height: 500px) {
    .pop-card { width: 320px; max-height: 90dvh; }
    .pop-header { padding: 12px 22px 10px 16px; }
    .pop-stage { margin-bottom: 4px; }
    .pop-name { font-size: 17px; margin-bottom: 2px; }
    .pop-body { padding: 10px 16px 12px; }
    .pop-details { gap: 10px 14px; }
    .pop-footer { padding: 8px 10px; }
    .pop-btn { padding: 9px 12px; }
  }
  .leaflet-control-attribution {
    background: rgba(6, 34, 41, 0.7) !important;
    color: var(--ink-faint) !important;
    font-size: 10px !important;
  }
  .leaflet-control-attribution a { color: var(--coral) !important; }

  /* =========================================================
     PAGE GESTION (tabs À faire / Budget)
     ========================================================= */
  .gestion {
    padding: calc(env(safe-area-inset-top, 0px) + 28px) var(--pad-x) 110px;
  }
  .gestion__head { margin-bottom: 16px; }
  .gestion__title {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: clamp(40px, 11vw, 56px);
    line-height: 0.98;
    letter-spacing: -0.02em;
    margin: 14px 0 12px;
  }
  .gestion__title em { font-style: italic; color: var(--sand); }
  .gestion__lead {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--ink-soft);
    margin-bottom: 18px;
  }
  .gestion__tabs {
    display: flex;
    gap: 4px;
    margin-top: 22px;
    padding: 4px;
    border-radius: 999px;
    background: rgba(251, 246, 233, 0.06);
    border: 1px solid var(--line);
  }
  .gestion__content {
    transition: opacity 180ms var(--ease);
  }
  .gestion__content.is-switching {
    opacity: 0.35;
    pointer-events: none;
  }
  .gestion__tab {
    flex: 1;
    text-align: center;
    padding: 10px 14px;
    border-radius: 999px;
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--ink-soft);
    transition: background 200ms var(--ease), color 200ms var(--ease);
    position: relative;
  }
  .gestion__tab.is-active {
    background: var(--coral);
    color: var(--bg-deep);
  }
  .gestion__tab-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 18px;
    height: 18px;
    padding: 0 5px;
    margin-left: 6px;
    border-radius: 999px;
    background: rgba(251, 246, 233, 0.18);
    color: var(--ink);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0;
    text-transform: none;
    line-height: 18px;
  }
  .gestion__tab.is-active .gestion__tab-badge {
    background: var(--bg-deep);
    color: var(--coral);
  }

  /* =========================================================
     BUDGET — onglet
     ========================================================= */
  .budget__advances {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 18px;
  }
  .budget__advance {
    padding: 18px 14px 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    text-align: center;
    background: rgba(251, 246, 233, 0.04);
  }
  .budget__advance-name {
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-faint);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .budget__advance-amount {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 28px;
    color: var(--ink);
  }
  .budget__advance-amount small {
    font-size: 14px;
    color: var(--ink-faint);
    margin-left: 2px;
    font-style: italic;
  }
  .budget__advance-echeance {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--line);
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    font-weight: 600;
  }
  .budget__advance-echeance strong {
    display: block;
    margin-top: 3px;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 18px;
    font-weight: 500;
    color: var(--coral);
    letter-spacing: 0;
    text-transform: none;
  }
  .budget__balance {
    margin-top: 14px;
    padding: 18px;
    border-radius: 8px;
    text-align: center;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 17px;
    line-height: 1.4;
  }
  .budget__balance strong {
    font-weight: 500;
    color: var(--coral);
    font-size: 20px;
  }
  .budget__balance-who { font-weight: 500; }
  .budget__balance-future {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--line);
    font-size: 14px;
    line-height: 1.4;
    color: var(--ink-mute);
  }
  .budget__balance-future strong {
    font-size: 16px;
  }
  .budget__balance-future-label {
    font-family: 'Inter', sans-serif;
    font-style: normal;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    font-weight: 600;
    margin-right: 6px;
  }
  .budget__balance.is-due {
    background: rgba(233, 141, 88, 0.12);
    border: 1px solid rgba(233, 141, 88, 0.30);
    color: var(--ink);
  }
  .budget__balance.is-even {
    background: rgba(122, 150, 87, 0.14);
    border: 1px solid rgba(122, 150, 87, 0.35);
    color: var(--ink);
  }
  .budget__total {
    margin-top: 14px;
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .budget__total strong {
    color: var(--ink);
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 18px;
    text-transform: none;
    letter-spacing: 0;
  }
  .budget__total--upcoming {
    margin-top: 4px;
  }
  .budget__total--upcoming strong { color: var(--coral); }
  .budget__add-btn {
    display: block;
    width: 100%;
    margin: 24px 0 16px;
    padding: 14px 18px;
    border-radius: 999px;
    background: var(--coral);
    color: var(--bg-deep);
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: opacity 180ms var(--ease);
    box-shadow: 0 4px 14px rgba(233, 141, 88, 0.35);
  }
  .budget__add-btn:active { opacity: 0.88; }
  .budget__list-title {
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--coral);
    font-weight: 600;
    margin: 24px 0 10px;
  }
  .budget__items { display: flex; flex-direction: column; gap: 6px; }
  .budget__empty {
    margin-top: 16px;
    padding: 16px;
    border-radius: 6px;
    background: rgba(251, 246, 233, 0.04);
    color: var(--ink-faint);
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 14px;
    line-height: 1.5;
    text-align: center;
  }
  .budget__item-btn {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 8px;
    background: rgba(251, 246, 233, 0.04);
    border: 1px solid var(--line);
    text-align: left;
    color: var(--ink);
    transition: background 180ms var(--ease);
  }
  .budget__item-btn:active { background: rgba(251, 246, 233, 0.08); }
  .budget__item-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: grid; place-items: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .budget__item-text { flex: 1; min-width: 0; }
  .budget__item-label {
    display: block;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 16px;
    color: var(--ink);
    line-height: 1.2;
  }
  .budget__item-text small {
    display: block;
    margin-top: 2px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.04em;
  }
  .budget__item-amount {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 18px;
    color: var(--ink);
    flex-shrink: 0;
  }

  /* Item « à venir » : icône en pointillé + montant en corail */
  .budget__item--upcoming .budget__item-btn {
    background: rgba(251, 246, 233, 0.02);
    border-style: dashed;
    border-color: var(--line-strong);
  }
  .budget__item-icon--upcoming {
    background: transparent !important;
    color: var(--cat-color, var(--ink-faint)) !important;
    border: 1.5px dashed var(--cat-color, var(--ink-faint));
    opacity: 0.85;
  }
  .budget__item-amount--upcoming {
    color: var(--coral);
  }

  /* Expense sheet — formulaire */
  .expense-form { display: flex; flex-direction: column; gap: 16px; }
  .expense-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .expense-field > span {
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    font-weight: 600;
  }
  .expense-field input[type="text"],
  .expense-field input[type="number"],
  .expense-field input[type="date"] {
    background: rgba(251, 246, 233, 0.06);
    border: 1px solid var(--line-strong);
    border-radius: 6px;
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    padding: 12px 14px;
  }
  .expense-field textarea {
    width: 100%;
    resize: vertical;
    background: rgba(212, 165, 116, 0.08);
    border: 1px solid var(--line-strong);
    border-left: 2px solid var(--sand);
    border-radius: 0 6px 6px 0;
    color: var(--ink);
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 15px;
    line-height: 1.55;
    padding: 14px 16px;
    min-height: 90px;
  }
  .expense-field textarea::placeholder {
    color: var(--ink-mute);
    font-style: italic;
  }
  .expense-field input:focus,
  .expense-field textarea:focus { outline: none; border-color: var(--coral); }
  .expense-field textarea:focus { border-left-color: var(--coral); }

  /* =========================================================

     ========================================================= */
  .todos {
    padding: calc(env(safe-area-inset-top, 0px) + 28px) 0 110px;

  .todos__head { padding: 0 var(--pad-x) 8px; }

  .todo {

  /* Mode édition */
  .todo--editing { padding: 12px 0; align-items: flex-start; }

  .todo__edit-btn--save {

  .todo__edit-btn--save:active { opacity: 0.9; }
  .todo__edit-btn--danger {

  .todo__edit-btn--danger:active {

  /* Bouton ⋮ pour entrer en mode réorganisation */
  .todo__reorder-toggle {
    width: 36px;
    display: grid;
    place-items: center;
    color: var(--ink-mute);
    font-size: 22px;

    border-radius: 4px;

    background: rgba(233, 141, 88, 0.10);

    margin: 0 12px 0 8px;

    flex: 1;
    min-width: 0;
    font-size: 15px;

    color: var(--ink);
    word-wrap: break-word;
    padding: 6px 4px;

  .todo__reorder {

  .todo__reorder-btn {
    min-width: 40px;

    padding: 0 8px;

  /* =========================================================
     LOADER & STATUS
     ========================================================= */
  .loader {
    min-height: 100vh;

    color: var(--ink-faint);

    letter-spacing: 0.2em;

  /* Hide focus outlines for mouse, keep for keyboard */
  :focus-visible { outline: 2px solid var(--coral); outline-offset: 2px; }
</style>

<body>

<main id="app" aria-live="polite">
  <div class="loader">Chargement…</div>
</main>

<script type="module">
// =========================================================
// FIREBASE (ping seul pour l'instant — données = JSON local)
// =========================================================
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  initializeFirestore, persistentLocalCache, persistentMultipleTabManager,
  doc, setDoc, addDoc, updateDoc, deleteDoc, collection, query, orderBy,
  onSnapshot, serverTimestamp,
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBnI7hdhZd7yKCxen-c6GBfRu1Mn7iuClk",
  authDomain: "voyage-slovenie-2026.firebaseapp.com",
  projectId: "voyage-slovenie-2026",
  storageBucket: "voyage-slovenie-2026.firebasestorage.app",
  messagingSenderId: "411413122851",
  appId: "1:411413122851:web:014f6ab7758b3a90aec696"
};

const fbApp = initializeApp(firebaseConfig);
const db = initializeFirestore(fbApp, {
  localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() }),
});

async function fbPing() {
  try {
    await setDoc(doc(db, "ping", "client"), { at: serverTimestamp(), ua: navigator.userAgent.slice(0, 80) });
  } catch (e) {
    console.warn('Firebase ping failed', e);
  }
}

// =========================================================
// DATA
// =========================================================
const STATE = {
  trip: null,
  legs: null,
  days: [],
  staysById: {},
};

// Map stay → photo key (la plus représentative de la ville, pour TBD ou fallback)
const STAY_PHOTO = {
  nice:       'j01-nice',
  venise:     'j02-venise-arrivee',
  piran:      'j04-piran',
  postojna:   'j06-predjama',
  ljubljana:  'j08-ljubljana',
  bled:       'j09-bled',
  tolmin:     'j14-rafting',
  zelenci:    'j15-canyoning',
  laigueglia: 'j16-laigueglia',
};

// Hébergements avec une vraie photo de l'annonce (photos/stay-<id>-*.jpg)
const STAYS_WITH_REAL_PHOTO = new Set(['venise', 'piran', 'postojna', 'ljubljana', 'tolmin', 'bled', 'zelenci']);

async function loadData() {
  const [days, stays] = await Promise.all([
    fetch('data/days.json').then(r => r.json()),
    fetch('data/stays.json').then(r => r.json()),
  ]);
  STATE.trip = days.trip;
  STATE.legs = days.legs;
  STATE.days = days.days;
  STATE.staysById = Object.fromEntries(stays.stays.map(s => [s.id, s]));
}

// =========================================================
// HELPERS
// =========================================================
const MONTHS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

function formatDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  return `${d.getDate()} ${MONTHS[d.getMonth()]}`;
}

function formatLongDate(iso, weekday) {
  return `${weekday} ${formatDate(iso)}`;
}

function daysUntil(iso) {
  const target = new Date(iso + 'T00:00:00');
  const now = new Date();
  now.setHours(0, 0, 0, 0);
  return Math.round((target - now) / 86400000);
}

function formatRange(arrIso, depIso) {
  const a = new Date(arrIso + 'T00:00:00');
  const b = new Date(depIso + 'T00:00:00');
  if (a.getMonth() === b.getMonth()) {
    return `${a.getDate()} → ${b.getDate()} ${MONTHS[a.getMonth()]}`;
  }
  return `${a.getDate()} ${MONTHS[a.getMonth()]} → ${b.getDate()} ${MONTHS[b.getMonth()]}`;
}

function formatDueDate(iso) {
  if (!iso || !/^\d{4}-\d{2}-\d{2}$/.test(iso)) return iso || '';
  const d = new Date(iso + 'T00:00:00');
  return `le ${d.getDate()} ${MONTHS[d.getMonth()]}`;
}

function mapsLink(coords, label = '') {
  if (!coords) return null;
  const [lat, lng] = coords;
  const q = label ? encodeURIComponent(label) : `${lat},${lng}`;
  return `https://www.google.com/maps/search/?api=1&query=${lat},${lng}&query_place_id=${q}`;
}

function telLink(phone) {
  return phone ? `tel:${phone.replace(/\s/g, '')}` : null;
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function photoSrc(key, kind = 'hero') {
  return `photos/${key}-${kind}.jpg`;
}

// =========================================================
// ROUTER
// =========================================================
const ROUTES = [
  { match: /^#?\/?$/,                 render: renderCover },
  { match: /^#?\/timeline\/?$/,       render: renderTimeline },
  { match: /^#?\/hebergements(?:\/([\w-]+))?\/?$/, render: renderStays },
  { match: /^#?\/activites\/?$/,      render: renderActivities },
  { match: /^#?\/gestion(?:\/([\w-]+))?\/?$/, render: renderGestion },
  { match: /^#?\/a-faire\/?$/,        render: () => renderGestion([null, 'a-faire']) },
  { match: /^#?\/carte\/?$/,          render: renderMap },
  { match: /^#?\/jour\/(\d+)\/?$/,    render: (m) => renderDay(parseInt(m[1], 10)) },
];

const MY_MAPS_ID = '1MqgbSNlPFTARwIBmdg3xtdE9kVftrTk';
const MY_MAPS_URL = `https://www.google.com/maps/d/viewer?mid=${MY_MAPS_ID}`;
const KML_URL = 'voyage-slovenie-2026.kml';

// Subscription globale Firestore pour les actions — alimente la liste
// /a-faire ET la pastille notification sur la cover.
let ACTIONS_UNSUB = null;
let OPEN_ACTIONS_COUNT = 0;

function startActionsSubscription() {
  if (ACTIONS_UNSUB) return;
  ACTIONS_UNSUB = onSnapshot(collection(db, 'actions'),
    (snap) => {
      const items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      items.sort(sortTodos);
      CURRENT_TODOS = items;
      OPEN_ACTIONS_COUNT = items.filter(t => t.status !== 'done').length;
      updateActionsBadge();
      if (/^#?\/(a-faire|gestion\/a-faire)/.test(location.hash)) paintTodos(items);
    },
    (err) => { console.error(err); flashError('Sync impossible : ' + err.code); }
  );
}

function updateActionsBadge() {
  document.querySelectorAll('[data-actions-badge]').forEach(el => {
    if (OPEN_ACTIONS_COUNT > 0) {
      el.textContent = OPEN_ACTIONS_COUNT;
      el.hidden = false;
    } else {
      el.hidden = true;
    }
  });
}

// Subscription Firestore notes — affichées sur les fiches journalières
let NOTES_UNSUB = null;
let NOTES_BY_DAY = {};
let NOTE_EDITING_ID = null;

function startNotesSubscription() {
  if (NOTES_UNSUB) return;
  NOTES_UNSUB = onSnapshot(collection(db, 'notes'),
    (snap) => {
      const items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      items.sort((a, b) => {
        const am = a.createdAt?.toMillis?.() ?? 0;
        const bm = b.createdAt?.toMillis?.() ?? 0;
        return am - bm;
      });
      NOTES_BY_DAY = {};
      for (const n of items) {
        const k = n.dayN;
        if (k == null) continue;
        (NOTES_BY_DAY[k] ||= []).push(n);
      }
      const m = location.hash.match(/^#?\/jour\/(\d+)/);
      if (m) paintNotes(parseInt(m[1], 10));
    },
    (err) => { console.error(err); flashError('Sync notes : ' + err.code); }
  );
}

function route() {
  const hash = location.hash || '#/';
  for (const r of ROUTES) {
    const m = hash.match(r.match);
    if (m) { r.render(m); return; }
  }
  // 404 → cover
  location.hash = '#/';
}

window.addEventListener('hashchange', route);

// =========================================================
// VUE JOUR (immersive — focus principal v2)
// =========================================================
function renderDay(n) {
  const day = STATE.days.find(d => d.n === n);
  if (!day) { location.hash = '#/timeline'; return; }

  const stay = day.stay ? STATE.staysById[day.stay] : null;
  const legLabel = STATE.legs[day.leg] ?? '';
  const photoKey = day.photo;

  // Sections optionnelles
  const driveHtml = day.drive ? `
    <section class="drive" aria-label="Trajet du jour">
      <span class="drive__city">${escapeHtml(day.drive.from)}</span>
      <span class="drive__arrow">→</span>
      <span class="drive__city drive__city--to">${escapeHtml(day.drive.to)}</span>
      <span class="drive__stats">${escapeHtml(day.drive.km)} km · ${escapeHtml(day.drive.hours)}</span>
    </section>` : '';

  const scheduleHtml = (day.schedule || []).map(item => `
    <li class="schedule__item">
      <span class="schedule__time">${escapeHtml(item.time)}</span>
      <h3 class="schedule__title">${escapeHtml(item.title)}</h3>
      <p class="schedule__desc">${escapeHtml(item.desc)}</p>
    </li>
  `).join('');

  const tipsHtml = day.tips && day.tips.length ? `
    <section class="day__tips">
      <h2 class="section-title">À retenir</h2>
      <ul class="tips">${day.tips.map(t => `<li>${escapeHtml(t)}</li>`).join('')}</ul>
    </section>` : '';

  const notesHtml = `
    <section class="day__notes">
      <h2 class="section-title">Notes</h2>
      <div class="notes" data-day="${day.n}">
        <div class="notes__loader">…</div>
      </div>
    </section>`;

  const stayHtml = stay ? renderStayCard(stay) : '';

  const html = `
    <article class="page day" data-day="${day.n}">
      <header class="day__hero">
        <picture class="day__photo">
          <source media="(min-width: 768px)" srcset="${photoSrc(photoKey, 'hero')}">
          <img src="${photoSrc(photoKey, 'mobile')}" alt="" loading="eager" decoding="async">
        </picture>
        <div class="day__topbar">
          <a class="day__back" href="#/timeline">Itinéraire</a>
          <span class="day__counter">Jour ${day.n} / ${STATE.days.length}</span>
        </div>
        <div class="day__hero-text">
          ${legLabel ? `<div class="day__leg">${escapeHtml(legLabel)}</div>` : ''}
          <h1 class="day__title">${escapeHtml(day.title)}</h1>
          <p class="day__date">
            <strong>${escapeHtml(formatLongDate(day.date, day.weekday))}</strong>
            ${day.subtitle ? ` · ${escapeHtml(day.subtitle)}` : ''}
          </p>
        </div>
      </header>

      <div class="day__body">
        ${day.intro ? `<section class="day__intro">${escapeHtml(day.intro)}</section>` : ''}
        ${driveHtml}
        ${scheduleHtml ? `
          <section class="day__schedule">
            <h2 class="section-title">Programme</h2>
            <ol class="schedule">${scheduleHtml}</ol>
          </section>` : ''}
        ${stayHtml}
        ${tipsHtml}
        ${notesHtml}
      </div>

    </article>
  `;

  mount(html);
  attachSwipe(day.n);
  window.scrollTo(0, 0);
  preloadNeighborPhotos(day.n);
  paintNotes(day.n);
}

function preloadNeighborPhotos(n) {
  const isWide = window.matchMedia('(min-width: 768px)').matches;
  const kind = isWide ? 'hero' : 'mobile';
  for (const offset of [-1, 1]) {
    const d = STATE.days.find(x => x.n === n + offset);
    if (!d) continue;
    const img = new Image();
    img.src = photoSrc(d.photo, kind);
  }
}

function renderStayCard(stay) {
  const isConfirmed = stay.status === 'confirmed';
  const statusLabel = isConfirmed ? 'Réservé' : 'À réserver';
  const cls = isConfirmed ? 'stay--confirmed' : 'stay--tbd';

  const meta = [];
  if (stay.checkin)  meta.push(['Check-in',  stay.checkin]);
  if (stay.checkout) meta.push(['Check-out', stay.checkout]);

  return `
    <section class="day__stay">

// =========================================================
// SWIPE entre jours
// =========================================================
let SWIPE_HANDLERS = null;
function detachSwipe() {
  if (!SWIPE_HANDLERS) return;
  const { container, onStart, onMove, onEnd, onKey } = SWIPE_HANDLERS;
  container.removeEventListener('touchstart', onStart);
  container.removeEventListener('touchmove',  onMove);
  container.removeEventListener('touchend',   onEnd);
  document.removeEventListener('keydown', onKey);
  SWIPE_HANDLERS = null;
}

function attachSwipe(currentN) {
  detachSwipe(); // jamais empiler — désactive complètement hors vue jour
  const container = document.getElementById('app');
  let startX = 0, startY = 0, tracking = false, locked = null;
  const THRESHOLD = 60;
  const VERTICAL_LOCK = 12;

  function onStart(e) {
    const t = e.touches ? e.touches[0] : e;
    startX = t.clientX;
    startY = t.clientY;
    tracking = true;
    locked = null;
  }
  function onMove(e) {
    if (!tracking) return;
    const t = e.touches ? e.touches[0] : e;
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    if (locked === null) {
      if (Math.abs(dy) > VERTICAL_LOCK) locked = 'v';
      else if (Math.abs(dx) > VERTICAL_LOCK) locked = 'h';
    }
  }
  function onEnd(e) {
    if (!tracking) return;
    tracking = false;
    // Garde : si on a quitté la vue jour entre-temps (carte, etc.), on ignore
    if (!/^#?\/jour\/\d+/.test(location.hash)) return;
    const t = (e.changedTouches ? e.changedTouches[0] : e);
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    if (locked !== 'h') return;
    if (Math.abs(dx) < THRESHOLD || Math.abs(dx) < Math.abs(dy)) return;
    if (dx < 0 && currentN < STATE.days.length) location.hash = `#/jour/${currentN + 1}`;
    if (dx > 0 && currentN > 1)                 location.hash = `#/jour/${currentN - 1}`;
  }
  function onKey(e) {
    if (!/^#?\/jour\/\d+/.test(location.hash)) return;
    if (e.key === 'ArrowRight' && currentN < STATE.days.length) location.hash = `#/jour/${currentN + 1}`;
    if (e.key === 'ArrowLeft'  && currentN > 1)                 location.hash = `#/jour/${currentN - 1}`;
  }

  container.addEventListener('touchstart', onStart, { passive: true });
  container.addEventListener('touchmove',  onMove,  { passive: true });
  container.addEventListener('touchend',   onEnd,   { passive: true });
  document.addEventListener('keydown', onKey);
  SWIPE_HANDLERS = { container, onStart, onMove, onEnd, onKey };
}

// Détache le swipe à chaque navigation vers une route hors vue jour
window.addEventListener('hashchange', () => {
  if (!/^#?\/jour\/\d+/.test(location.hash)) detachSwipe();
});

function renderTimeline() {
  // Group days by leg
  const groups = [];
  let current = null;
  for (const d of STATE.days) {
    if (!current || current.leg !== d.leg) {
      current = { leg: d.leg, days: [] };
      groups.push(current);
    }
    current.days.push(d);
  }

  const groupsHtml = groups.map(g => {
    const legLabel = STATE.legs[g.leg] || '';
    const range = g.days.length === 1
      ? `Jour ${g.days[0].n}`
      : `Jours ${g.days[0].n}–${g.days[g.days.length - 1].n}`;
    return `
      <div class="timeline__leg">
        <span>${escapeHtml(legLabel)} · ${range}</span>
      </div>
      ${g.days.map(renderTimelineDay).join('')}
    `;
  }).join('');

  mount(`
    <section class="page timeline">
      <header class="timeline__head">
        <a class="timeline__back" href="#/">Retour</a>
        <div class="timeline__kicker">L'itinéraire</div>
