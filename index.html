<style>
  /* =========================================================
     RESET
     ========================================================= */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; -webkit-tap-highlight-color: transparent; }
  img, picture { display: block; max-width: 100%; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
  a { color: inherit; text-decoration: none; }
  ol, ul { list-style: none; }

  /* =========================================================
     PALETTE & TOKENS — Adriatique au crépuscule
     ========================================================= */
  :root {
    --bg: #0a3a44;
    --bg-deep: #062229;
    --bg-soft: #124852;

    --ink: #fbf6e9;
    --ink-soft: rgba(251, 246, 233, 0.78);
    --ink-faint: rgba(251, 246, 233, 0.52);
    --ink-mute: rgba(251, 246, 233, 0.32);

    --coral: #e98d58;
    --sand: #d4a574;
    --teal-light: #6cb6c4;
    --olive: #7a9657;

    --line: rgba(251, 246, 233, 0.10);
    --line-strong: rgba(251, 246, 233, 0.20);

    --fz-display: clamp(40px, 11vw, 64px);
    --fz-h1: clamp(28px, 7vw, 38px);
    --fz-h2: clamp(20px, 5vw, 24px);
    --fz-h3: 17px;
    --fz-body: 16px;
    --fz-small: 13px;
    --fz-micro: 11px;

    --gap-xs: 6px;
    --gap-sm: 12px;
    --gap-md: 20px;
    --gap-lg: 32px;
    --gap-xl: 56px;

    --pad-x: 22px;
    --max-w: 540px;

    --ease: cubic-bezier(.2, .65, .2, 1);
  }

  /* =========================================================
     BASE TYPO
     ========================================================= */
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: var(--fz-body);
    line-height: 1.55;
    min-height: 100vh;
    overflow-x: hidden;
    padding-bottom: env(safe-area-inset-bottom);
    -webkit-font-smoothing: antialiased;
  }
  .display, h1, h2, h3 { font-family: 'Fraunces', Georgia, serif; font-weight: 500; letter-spacing: -0.015em; }
  .italic { font-style: italic; }

  /* =========================================================
     APP SHELL
     ========================================================= */
  #app {
    max-width: var(--max-w);
    margin: 0 auto;
    min-height: 100vh;
    background: var(--bg);
    position: relative;
    isolation: isolate;
  }

  /* Page fade transition */
  .page { animation: page-in 380ms var(--ease) both; }
  @keyframes page-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* =========================================================
     DAY VIEW — IMMERSIVE
     ========================================================= */
  .day { padding-bottom: 110px; }

  /* HERO --------------------------------------------------- */
  .day__hero {
    position: relative;
    height: 78vh;
    min-height: 520px;
    width: 100%;
    overflow: hidden;
    background: var(--bg-deep);
  }
  .day__photo,
  .day__photo img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .day__photo img {
    animation: hero-zoom 14s var(--ease) both;
  }
  @keyframes hero-zoom {
    from { transform: scale(1.06); }
    to   { transform: scale(1); }
  }
  .day__hero::before,
  .day__hero::after {
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    pointer-events: none;
    z-index: 1;
  }
  .day__hero::before {
    top: 0;
    height: 35%;
    background: linear-gradient(180deg, rgba(6, 34, 41, 0.65) 0%, rgba(6, 34, 41, 0) 100%);
  }
  .day__hero::after {
    bottom: 0;
    height: 75%;
    background: linear-gradient(180deg,
      rgba(10, 58, 68, 0) 0%,
      rgba(10, 58, 68, 0.35) 30%,
      rgba(10, 58, 68, 0.85) 70%,
      var(--bg) 100%);
  }

  /* HERO TOP BAR (back + day index) */
  .day__topbar {
    position: absolute;
    top: calc(env(safe-area-inset-top, 0px) + 14px);
    left: 0;
    right: 0;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--pad-x);
  }
  .day__back,
  .day__counter {
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.85;
    padding: 8px 0;
  }
  .day__back { display: inline-flex; align-items: center; gap: 8px; }
  .day__back::before { content: '←'; font-size: 14px; letter-spacing: 0; }

  /* HERO TEXT (bottom of hero) */
  .day__hero-text {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 2;
    padding: 0 var(--pad-x) 38px;
  }
  .day__leg {
    font-size: var(--fz-micro);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--coral);
    margin-bottom: 14px;
    font-weight: 500;
  }
  .day__leg::after {
    content: '';
    display: inline-block;
    width: 24px;
    height: 1px;
    background: var(--coral);
    vertical-align: middle;
    margin-left: 10px;
    transform: translateY(-2px);
  }
  .day__title {
    font-size: var(--fz-display);
    font-style: italic;
    font-weight: 500;
    line-height: 1.02;
    color: var(--ink);
    margin-bottom: 14px;
    text-wrap: balance;
  }
  .day__date {
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-small);
    color: var(--ink-soft);
    letter-spacing: 0.02em;
  }
  .day__date strong { color: var(--ink); font-weight: 500; }

  /* BODY --------------------------------------------------- */
  .day__body {
    position: relative;
    z-index: 2;
    padding: 0 var(--pad-x);
    margin-top: -8px;
  }
  .day__body > section + section { margin-top: var(--gap-xl); }

  .section-title {
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--coral);
    margin-bottom: 20px;
  }

  /* INTRO -------------------------------------------------- */
  .day__intro {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 19px;
    line-height: 1.5;
    color: var(--ink);
    padding: 4px 0 0;
    text-wrap: pretty;
  }
  .day__intro::first-letter {
    font-size: 1.4em;
    line-height: 1;
  }

  /* DRIVE -------------------------------------------------- */
  .drive {
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    padding: 22px 0;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 14px;
  }
  .drive__city {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 17px;
    color: var(--ink);
  }
  .drive__city--to { text-align: right; }
  .drive__arrow {
    color: var(--coral);
    font-size: 14px;
    letter-spacing: 0.2em;
  }
  .drive__stats {
    grid-column: 1 / -1;
    text-align: center;
    font-size: var(--fz-micro);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-top: 6px;
  }

  /* SCHEDULE ----------------------------------------------- */
  .schedule { display: flex; flex-direction: column; gap: var(--gap-lg); }
  .schedule__item {
    position: relative;
    padding-left: 0;
  }
  .schedule__time {
    display: inline-block;
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--sand);
    margin-bottom: 10px;
  }
  .schedule__title {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 500;
    font-style: italic;
    color: var(--ink);
    margin-bottom: 8px;
    line-height: 1.2;
    text-wrap: balance;
  }
  .schedule__desc {
    color: var(--ink-soft);
    font-size: 15.5px;
    line-height: 1.6;
    text-wrap: pretty;
  }

  /* STAY CARD ---------------------------------------------- */
  .stay {
    position: relative;
    border: 1px solid var(--line-strong);
    border-radius: 4px;
    padding: 22px;
    background: rgba(251, 246, 233, 0.03);
  }
  .stay__status {
    display: inline-block;
    font-size: var(--fz-micro);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 12px;
    font-weight: 600;
  }
  .stay--confirmed .stay__status { color: var(--olive); }
  .stay--tbd       .stay__status { color: var(--coral); }
  .stay__name {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 22px;
    line-height: 1.2;
    margin-bottom: 6px;
    color: var(--ink);
  }
  .stay__city {
    font-size: var(--fz-small);
    color: var(--ink-faint);
    margin-bottom: 14px;
  }
  .stay__meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 18px;
    margin: 14px 0 0;
    padding-top: 14px;
    border-top: 1px solid var(--line);
  }
  .stay__meta dt {
    font-size: var(--fz-micro);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 2px;
  }
  .stay__meta dd { font-size: 14px; color: var(--ink-soft); }
  .stay__notes {
    margin-top: 14px;
    font-size: 14px;
    color: var(--ink-soft);
    font-style: italic;
    line-height: 1.55;
  }
  .stay__actions {
    margin-top: 18px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .action {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 14px;
    border: 1px solid var(--line-strong);
    border-radius: 999px;
    font-size: 13px;
    color: var(--ink);
    transition: background 200ms var(--ease), border-color 200ms var(--ease);
  }
  .action:active { background: rgba(251, 246, 233, 0.08); border-color: var(--coral); }
  .action__icon { font-size: 14px; }
  .action--accent {
    border-color: var(--coral);
    color: var(--coral);
  }
  .action--accent:active {
    background: rgba(233, 141, 88, 0.12);
    color: var(--ink);
  }
  .action--ghost {
    border-color: transparent;
    color: var(--ink-soft);
    padding-left: 10px;
    padding-right: 10px;
  }
  .action--ghost:active {
    background: rgba(251, 246, 233, 0.06);
    color: var(--ink);
  }

  /* TIPS --------------------------------------------------- */
  .tips { display: flex; flex-direction: column; gap: 12px; }
  .tips li {
    position: relative;
    padding-left: 22px;
    color: var(--ink-soft);
    font-size: 15px;
    line-height: 1.55;
  }
  .tips li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0.7em;
    width: 12px;
    height: 1px;
    background: var(--coral);
  }

  /* DAY NAV (bottom fixed) --------------------------------- */
  .day-nav {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
    width: calc(100% - 28px);
    max-width: calc(var(--max-w) - 28px);
    z-index: 50;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: stretch;
    background: rgba(6, 34, 41, 0.78);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px;
    gap: 4px;
  }
  .day-nav button,
  .day-nav a {
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-micro);
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink);
    padding: 12px 14px;
    border-radius: 999px;
    text-align: center;
    transition: background 200ms var(--ease);
  }
  .day-nav button:disabled { color: var(--ink-mute); cursor: default; }
  .day-nav button:not(:disabled):active,
  .day-nav a:active { background: rgba(251, 246, 233, 0.08); }
  .day-nav__home { display: inline-flex; align-items: center; justify-content: center; }
  .day-nav__prev { text-align: left; padding-left: 18px; }
  .day-nav__next { text-align: right; padding-right: 18px; }

  /* =========================================================
     COVER — immersive
     ========================================================= */
  .cover {
    position: relative;
    min-height: 100vh;
    min-height: 100dvh;
    width: 100%;
    overflow: hidden;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }
  .cover__photo,
  .cover__photo img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .cover__photo img { animation: hero-zoom 22s var(--ease) both; }

  /* Gradient allégé : juste assez pour la lisibilité, sans écraser la photo */
  .cover::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 1;
    background:
      radial-gradient(ellipse 80% 60% at 30% 55%, rgba(233, 141, 88, 0.18) 0%, transparent 60%),
      linear-gradient(180deg,
        rgba(6, 34, 41, 0.30) 0%,
        rgba(6, 34, 41, 0.05) 22%,
        rgba(6, 34, 41, 0.05) 50%,
        rgba(6, 34, 41, 0.55) 92%,
        rgba(6, 34, 41, 0.75) 100%);
  }

  .cover__top,
  .cover__main,
  .cover__bottom { position: relative; z-index: 2; }

  .cover__top {
    padding: calc(env(safe-area-inset-top, 0px) + 22px) var(--pad-x) 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: var(--fz-micro);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink);
    font-weight: 600;
    text-shadow: 0 1px 12px rgba(6, 34, 41, 0.5);
  }
  .cover__countdown {
    color: var(--sand);
    background: rgba(6, 34, 41, 0.35);
    padding: 6px 12px;
    border-radius: 999px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  /* Texte au tiers supérieur — la photo respire en dessous */
  .cover__main {
    align-self: start;
    padding: 14vh var(--pad-x) 0;
    text-shadow: 0 2px 24px rgba(6, 34, 41, 0.45);
  }
  .cover__kicker {
    font-size: var(--fz-micro);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--sand);
    margin-bottom: 22px;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }
  .cover__kicker::before,
  .cover__kicker::after {
    content: '';
    width: 22px;
    height: 1px;
    background: var(--sand);
  }
  .cover__title {
    font-family: 'Fraunces', serif;
    font-size: clamp(76px, 23vw, 138px);
    font-style: italic;
    font-weight: 500;
    line-height: 0.92;
    letter-spacing: -0.03em;
    margin-bottom: 24px;
    color: var(--ink);
  }
  .cover__subtitle {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 22px;
    line-height: 1.3;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .cover__meta {
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-small);
    color: var(--ink);
    letter-spacing: 0.04em;
    opacity: 0.92;
  }

  .cover__bottom {
    padding: 28px var(--pad-x) calc(env(safe-area-inset-bottom, 0px) + 30px);
    display: flex;
    flex-direction: column;
    gap: 20px;
    align-items: stretch;
  }
  .cover__cta {
    display: inline-flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 26px;
    border-radius: 999px;
    font-family: 'Inter', sans-serif;
    font-size: var(--fz-small);
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink);
    background: var(--coral);
    box-shadow: 0 8px 28px rgba(233, 141, 88, 0.35), 0 1px 0 rgba(255, 255, 255, 0.15) inset;
    transition: transform 180ms var(--ease), box-shadow 180ms var(--ease);
  }
  .cover__cta::after {
    content: '→';
    font-size: 18px;
    letter-spacing: 0;
    transition: transform 220ms var(--ease);
  }
  .cover__cta:active {
    transform: scale(0.98);
    box-shadow: 0 4px 18px rgba(233, 141, 88, 0.40);
  }
  .cover__cta:hover::after { transform: translateX(3px); }

  .cover__links {
    display: flex;
    justify-content: center;
    gap: 32px;
    font-size: var(--fz-micro);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .cover__links a {
    color: var(--ink);
    opacity: 0.8;
    padding: 6px 2px;
    border-bottom: 1px solid transparent;
    transition: opacity 200ms var(--ease), border-color 200ms var(--ease);
  }
  .cover__links a:active {
    opacity: 1;
    border-bottom-color: var(--sand);
  }

  /* Lien « À faire » + pastille notification */
  .cover__link-todo { position: relative; white-space: nowrap; }
  .cover__badge {
    position: absolute;
    top: -10px;
    right: -16px;
    min-width: 20px;
    height: 20px;
    padding: 0 6px;
    border-radius: 999px;
    background: var(--coral);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 700;
    line-height: 20px;
    text-align: center;
    letter-spacing: 0;
    text-transform: none;
    box-shadow: 0 2px 10px rgba(233, 141, 88, 0.55), 0 0 0 2px var(--bg-deep);
  }

  /* Staggered fade-in */
  .stagger > * {
    opacity: 0;
    animation: stagger-in 700ms var(--ease) forwards;
  }
  .stagger > *:nth-child(1) { animation-delay: 250ms; }
  .stagger > *:nth-child(2) { animation-delay: 400ms; }
  .stagger > *:nth-child(3) { animation-delay: 550ms; }
  .stagger > *:nth-child(4) { animation-delay: 700ms; }
  .stagger > *:nth-child(5) { animation-delay: 850ms; }
  @keyframes stagger-in {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* =========================================================
     TIMELINE — éditoriale
     ========================================================= */
  .timeline {
    padding: calc(env(safe-area-inset-top, 0px) + 28px) 0 110px;
  }
  .timeline__head {
    padding: 0 var(--pad-x) 8px;
  }
  .timeline__back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: var(--fz-micro);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 22px;
    padding: 8px 0;
  }
  .timeline__back::before { content: '←'; letter-spacing: 0; }
  .timeline__kicker {
    font-size: var(--fz-micro);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--coral);
    margin-bottom: 14px;
    font-weight: 600;
  }
  .timeline__title {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: clamp(44px, 12vw, 64px);
    line-height: 0.98;

<script type="module">
// =========================================================
// FIREBASE (ping seul pour l'instant — données = JSON local)
// =========================================================
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
  initializeFirestore, persistentLocalCache, persistentMultipleTabManager,
  doc, setDoc, addDoc, updateDoc, deleteDoc, collection, query, orderBy,
  onSnapshot, serverTimestamp,
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBnI7hdhZd7yKCxen-c6GBfRu1Mn7iuClk",
  authDomain: "voyage-slovenie-2026.firebaseapp.com",
  projectId: "voyage-slovenie-2026",
  storageBucket: "voyage-slovenie-2026.firebasestorage.app",
  messagingSenderId: "411413122851",
  appId: "1:411413122851:web:014f6ab7758b3a90aec696"
};

const fbApp = initializeApp(firebaseConfig);
const db = initializeFirestore(fbApp, {
  localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() }),
});
const fbStatusEl = document.getElementById('fb-status');

async function fbPing() {
  try {
    await setDoc(doc(db, "ping", "client"), { at: serverTimestamp(), ua: navigator.userAgent.slice(0, 80) });
    fbStatusEl.classList.remove('is-error');
    fbStatusEl.classList.add('is-ok');

    console.warn('Firebase ping failed', e);
    fbStatusEl.classList.add('is-error');

}

// =========================================================
// DATA
// =========================================================
const STATE = {
  trip: null,
  legs: null,
  days: [],
  staysById: {},
};

// Map stay → photo key (la plus représentative de la ville, pour TBD ou fallback)
const STAY_PHOTO = {
  nice:       'j01-nice',
  venise:     'j02-venise-arrivee',
  piran:      'j04-piran',
  postojna:   'j06-predjama',
  ljubljana:  'j08-ljubljana',
  bled:       'j09-bled',
  tolmin:     'j14-rafting',
  zelenci:    'j15-canyoning',
  laigueglia: 'j16-laigueglia',
};

// Hébergements avec une vraie photo de l'annonce (photos/stay-<id>-*.jpg)
const STAYS_WITH_REAL_PHOTO = new Set(['venise', 'piran', 'postojna', 'ljubljana', 'tolmin', 'bled', 'zelenci']);

async function loadData() {
  const [days, stays] = await Promise.all([
    fetch('data/days.json').then(r => r.json()),
    fetch('data/stays.json').then(r => r.json()),
  ]);
  STATE.trip = days.trip;
  STATE.legs = days.legs;
  STATE.days = days.days;
  STATE.staysById = Object.fromEntries(stays.stays.map(s => [s.id, s]));
}

// =========================================================
// HELPERS
// =========================================================
const MONTHS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

function formatDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  return `${d.getDate()} ${MONTHS[d.getMonth()]}`;
}

function formatLongDate(iso, weekday) {
  return `${weekday} ${formatDate(iso)}`;
}

function daysUntil(iso) {
  const target = new Date(iso + 'T00:00:00');
  const now = new Date();
  now.setHours(0, 0, 0, 0);
  return Math.round((target - now) / 86400000);
}

function formatRange(arrIso, depIso) {
  const a = new Date(arrIso + 'T00:00:00');
  const b = new Date(depIso + 'T00:00:00');
  if (a.getMonth() === b.getMonth()) {
    return `${a.getDate()} → ${b.getDate()} ${MONTHS[a.getMonth()]}`;
  }
  return `${a.getDate()} ${MONTHS[a.getMonth()]} → ${b.getDate()} ${MONTHS[b.getMonth()]}`;
}

function formatDueDate(iso) {
  if (!iso || !/^\d{4}-\d{2}-\d{2}$/.test(iso)) return iso || '';
  const d = new Date(iso + 'T00:00:00');
  return `le ${d.getDate()} ${MONTHS[d.getMonth()]}`;
}

function mapsLink(coords, label = '') {
  if (!coords) return null;
  const [lat, lng] = coords;
  const q = label ? encodeURIComponent(label) : `${lat},${lng}`;
  return `https://www.google.com/maps/search/?api=1&query=${lat},${lng}&query_place_id=${q}`;
}

function telLink(phone) {
  return phone ? `tel:${phone.replace(/\s/g, '')}` : null;
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function photoSrc(key, kind = 'hero') {
  return `photos/${key}-${kind}.jpg`;
}

// =========================================================
// ROUTER
// =========================================================
const ROUTES = [
  { match: /^#?\/?$/,                 render: renderCover },
  { match: /^#?\/timeline\/?$/,       render: renderTimeline },
  { match: /^#?\/hebergements\/?$/,   render: renderStays },
  { match: /^#?\/a-faire\/?$/,        render: renderTodos },
  { match: /^#?\/jour\/(\d+)\/?$/,    render: (m) => renderDay(parseInt(m[1], 10)) },
];

// Subscription globale Firestore pour les actions — alimente la liste
// /a-faire ET la pastille notification sur la cover.
let ACTIONS_UNSUB = null;
let OPEN_ACTIONS_COUNT = 0;

function startActionsSubscription() {
  if (ACTIONS_UNSUB) return;
  ACTIONS_UNSUB = onSnapshot(collection(db, 'actions'),
    (snap) => {
      const items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      items.sort(sortTodos);
      CURRENT_TODOS = items;
      OPEN_ACTIONS_COUNT = items.filter(t => t.status !== 'done').length;
      updateActionsBadge();
      if (location.hash.startsWith('#/a-faire')) paintTodos(items);
    },
    (err) => { console.error(err); flashError('Sync impossible : ' + err.code); }
  );
}

function updateActionsBadge() {
  document.querySelectorAll('[data-actions-badge]').forEach(el => {
    if (OPEN_ACTIONS_COUNT > 0) {
      el.textContent = OPEN_ACTIONS_COUNT;
      el.hidden = false;
    } else {
      el.hidden = true;
    }
  });
}

function route() {
  const hash = location.hash || '#/';
  for (const r of ROUTES) {
    const m = hash.match(r.match);
    if (m) { r.render(m); return; }
  }
  // 404 → cover
  location.hash = '#/';
}

window.addEventListener('hashchange', route);

// =========================================================
// SWIPE entre jours
// =========================================================
function attachSwipe(currentN) {
  const container = document.getElementById('app');
  let startX = 0, startY = 0, tracking = false, locked = null;
  const THRESHOLD = 60;
  const VERTICAL_LOCK = 12;

  function onStart(e) {
    const t = e.touches ? e.touches[0] : e;
    startX = t.clientX;
    startY = t.clientY;
    tracking = true;
    locked = null;
  }
  function onMove(e) {
    if (!tracking) return;
    const t = e.touches ? e.touches[0] : e;
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    if (locked === null) {
      if (Math.abs(dy) > VERTICAL_LOCK) locked = 'v';
      else if (Math.abs(dx) > VERTICAL_LOCK) locked = 'h';
    }
  }
  function onEnd(e) {
    if (!tracking) return;
    tracking = false;
    const t = (e.changedTouches ? e.changedTouches[0] : e);
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    if (locked !== 'h') return;
    if (Math.abs(dx) < THRESHOLD || Math.abs(dx) < Math.abs(dy)) return;
    if (dx < 0 && currentN < STATE.days.length) location.hash = `#/jour/${currentN + 1}`;
    if (dx > 0 && currentN > 1)                 location.hash = `#/jour/${currentN - 1}`;
  }

  container.addEventListener('touchstart', onStart, { passive: true });
  container.addEventListener('touchmove',  onMove,  { passive: true });
  container.addEventListener('touchend',   onEnd,   { passive: true });

  // Clavier (desktop)
  function onKey(e) {
    if (e.key === 'ArrowRight' && currentN < STATE.days.length) location.hash = `#/jour/${currentN + 1}`;
    if (e.key === 'ArrowLeft'  && currentN > 1)                 location.hash = `#/jour/${currentN - 1}`;
  }
  document.addEventListener('keydown', onKey, { once: true });
}

function renderTimeline() {
  // Group days by leg
  const groups = [];

  for (const d of STATE.days) {
    if (!current || current.leg !== d.leg) {
      current = { leg: d.leg, days: [] };
      groups.push(current);
    }
    current.days.push(d);
  }

  const groupsHtml = groups.map(g => {
    const legLabel = STATE.legs[g.leg] || '';
    const range = g.days.length === 1
      ? `Jour ${g.days[0].n}`
      : `Jours ${g.days[0].n}–${g.days[g.days.length - 1].n}`;
    return `
      <div class="timeline__leg">
        <span>${escapeHtml(legLabel)} · ${range}</span>
      </div>
      ${g.days.map(renderTimelineDay).join('')}
    `;

  mount(`
    <section class="page timeline">

        <a class="timeline__back" href="#/">Retour</a>

function renderStayPageCard(stay) {
  const isConfirmed = stay.status === 'confirmed';
  const cls = isConfirmed ? 'stay-card--confirmed' : 'stay-card--tbd';
  const dayN = dayForStay(stay.id);
  const nightsLabel = `${stay.nights} nuit${stay.nights > 1 ? 's' : ''}`;
  const statusLabel = isConfirmed ? 'Réservé' : 'À réserver';

  // Confirmés → photo de l'annonce (stay-<id>-...)
  // TBD → photo contextuelle de la ville (STAY_PHOTO mapping)
  let mobileSrc, heroSrc;
  if (isConfirmed && STAYS_WITH_REAL_PHOTO.has(stay.id)) {
    mobileSrc = `photos/stay-${stay.id}-mobile.jpg`;
    heroSrc   = `photos/stay-${stay.id}-hero.jpg`;
  } else {
    const photoKey = STAY_PHOTO[stay.id];
    mobileSrc = photoKey ? photoSrc(photoKey, 'mobile') : null;
    heroSrc   = photoKey ? photoSrc(photoKey, 'hero')   : null;
  }

  const photoHtml = mobileSrc ? `
    <figure class="stay-card__photo">
      <picture>
        <source media="(min-width: 768px)" srcset="${heroSrc}">
        <img src="${mobileSrc}" alt="" loading="lazy" decoding="async">
      </picture>
      <span class="stay-card__nights">${nightsLabel}</span>
      <span class="stay-card__status">${statusLabel}</span>
    </figure>` : '';

  const head = `
    <header class="stay-card__head">
      <div class="stay-card__city">${escapeHtml(stay.city)} · ${escapeHtml(stay.country)}</div>
      <h2 class="stay-card__name">${escapeHtml(stay.name || 'À réserver')}</h2>
      <p class="stay-card__dates">${formatRange(stay.arrival, stay.departure)}</p>
    </header>
  `;

  let metaHtml = '';
  if (isConfirmed) {
    const meta = [];
    if (stay.checkin)      meta.push(['Check-in',  stay.checkin]);
    if (stay.checkout)     meta.push(['Check-out', stay.checkout]);
    if (stay.host)         meta.push(['Hôte',      stay.host]);
    if (stay.bookedBy && !stay.host) meta.push(['Réservé par', stay.bookedBy]);
    if (stay.confirmation) meta.push(['Référence', stay.confirmation]);
    if (stay.address && !stay.host) meta.push(['Adresse', stay.address]);
    if (meta.length) {
      metaHtml = `<dl class="stay-card__meta">${
        meta.map(([k, v]) => `<div><dt>${k}</dt><dd>${escapeHtml(v)}</dd></div>`).join('')
      }</dl>`;
    }
  }

  let priceHtml = '';
  if (isConfirmed && stay.price) {
    const pb = stay.paymentBreakdown || {};
    const parts = [];
    if (pb.paid > 0) {
      parts.push(`<span class="stay-card__price-paid">${Math.round(pb.paid)} € payé</span>`);
    }
    if (pb.remaining > 0) {
      const due = pb.remainingDue;
      const dueLabel = due === 'sur place' ? 'sur place'
        : (due && /^\d{4}-\d{2}-\d{2}$/.test(due) ? formatDueDate(due) : (due || 'à payer'));
      parts.push(`<span class="stay-card__price-due">${Math.round(pb.remaining)} € ${escapeHtml(dueLabel)}</span>`);
    }
    if (pb.extras) parts.push(`<span>${escapeHtml(pb.extras)}</span>`);
    priceHtml = `
      <p class="stay-card__price">
        <strong>${Math.round(stay.price)} €</strong>
        ${parts.join(' · ')}
      </p>`;
  }

  const notesHtml = stay.notes
    ? `<p class="stay-card__notes">${escapeHtml(stay.notes)}</p>`
    : '';

  const actions = [];
  if (stay.coords) {
    const url = `https://www.google.com/maps/search/?api=1&query=${stay.coords[0]},${stay.coords[1]}`;
    actions.push(`<a class="action" href="${url}" target="_blank" rel="noopener"><span class="action__icon">📍</span>Itinéraire</a>`);
  }
  if (stay.phone) {
    actions.push(`<a class="action" href="${telLink(stay.phone)}"><span class="action__icon">📞</span>Appeler</a>`);
  }
  if (stay.listing) {
    const labels = { airbnb: 'Voir sur Airbnb', booking: 'Voir sur Booking', website: 'Site officiel' };
    const label = labels[stay.listing.type] || 'Voir l\'annonce';
    actions.push(`<a class="action action--accent" href="${escapeHtml(stay.listing.url)}" target="_blank" rel="noopener"><span class="action__icon">↗</span>${label}</a>`);
  }
  if (stay.email) {
    actions.push(`<a class="action" href="mailto:${escapeHtml(stay.email)}"><span class="action__icon">✉</span>Email</a>`);
  }
  if (stay.listing && dayN) {
    actions.push(`<a class="action action--ghost" href="#/jour/${dayN}"><span class="action__icon">→</span>Jour ${dayN}</a>`);
  }
  const actionsHtml = actions.length
    ? `<div class="stay-card__actions">${actions.join('')}</div>`
    : '';

  return `
    <article class="stay-card ${cls}">
      ${photoHtml}
      <div class="stay-card__body">
        ${head}
        ${metaHtml}
        ${priceHtml}
        ${notesHtml}
        ${actionsHtml}
      </div>
    </article>
  `;
}

function dayForStay(stayId) {
  const d = STATE.days.find(d => d.stay === stayId);
  return d ? d.n : 1;
}

function renderTodos() {
  mount(`
    <section class="page todos">
      <header class="todos__head">
        <a class="timeline__back" href="#/">Retour</a>
        <div class="timeline__kicker">Préparatifs &amp; voyage</div>
        <h1 class="timeline__title">À faire,<br><em id="todos-counter">…</em></h1>
        <p class="timeline__lead">Liste partagée entre les téléphones.<br>Synchronisée Firestore, dispo offline.</p>
      </header>

      <form class="todos__add" id="todos-add" autocomplete="off">
        <input id="todos-input" type="text" placeholder="Nouvelle action…" maxlength="140" required>
        <button type="submit" aria-label="Ajouter">Ajouter</button>
      </form>

      <div id="todos-list" class="todos__list" aria-live="polite">
        <div class="todos__loader">Chargement…</div>
      </div>
    </section>
  `);
  window.scrollTo(0, 0);

  const form  = document.getElementById('todos-add');
  const input = document.getElementById('todos-input');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const title = input.value.trim();
    if (!title) return;
    input.value = '';
    input.disabled = true;
    try {
      await addDoc(collection(db, 'actions'), {
        title,
        status: 'open',
        order: Date.now(),
        createdAt: serverTimestamp(),
        doneAt: null,
      });
    } catch (err) {
      console.error(err);
      input.value = title;
      flashError(err.message);
    } finally {
      input.disabled = false;
      input.focus();
    }
  });

  // Affichage initial à partir du cache local — la subscription globale
  // pousse les mises à jour suivantes.
  paintTodos(CURRENT_TODOS);
}

function effectiveOrder(item) {
  if (typeof item.order === 'number') return item.order;
  return item.createdAt?.toMillis?.() ?? 0;
}

function sortTodos(a, b) {
  const ad = a.status === 'done' ? 1 : 0;
  const bd = b.status === 'done' ? 1 : 0;
  if (ad !== bd) return ad - bd;
  return effectiveOrder(a) - effectiveOrder(b);
}

let CURRENT_TODOS = [];
let EDITING_ID = null;

function paintTodos(items) {
  CURRENT_TODOS = items;
  const open = items.filter(i => i.status !== 'done');
  const done = items.filter(i => i.status === 'done');
  document.getElementById('todos-counter').textContent =
    open.length === 0
      ? (done.length ? `tout est fait` : `aucune pour l'instant`)
      : `${open.length} ouverte${open.length > 1 ? 's' : ''}`;

  const listEl = document.getElementById('todos-list');
  if (!open.length && !done.length) {
    listEl.innerHTML = `<p class="todos__empty">Rien à faire pour le moment.</p>`;
  } else {
    listEl.innerHTML = `
      <ul class="todos__group">
        ${open.map(renderTodoRow).join('')}
        ${done.map(renderTodoRow).join('')}
      </ul>
    `;
  }

  // Toggle (case ronde uniquement)
  listEl.querySelectorAll('[data-act="toggle"]').forEach(b =>
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleTodo(b.dataset.id, b.dataset.status);
    })
  );
  // Edit (clic sur le titre)
  listEl.querySelectorAll('[data-act="edit"]').forEach(b =>
    b.addEventListener('click', () => startEdit(b.dataset.id))
  );
  // Save (formulaire édition)
  listEl.querySelectorAll('form.todo__edit').forEach(f => {
    f.addEventListener('submit', (e) => {
      e.preventDefault();
      saveEdit(f.dataset.id, f.querySelector('input').value);
    });
  });
  // Cancel
  listEl.querySelectorAll('[data-act="cancel"]').forEach(b =>
    b.addEventListener('click', cancelEdit)
  );
  // Delete (depuis mode édition)
  listEl.querySelectorAll('[data-act="delete"]').forEach(b =>
    b.addEventListener('click', () => deleteTodo(b.dataset.id))
  );
  // Escape pour annuler
  const editInput = listEl.querySelector('.todo__edit-input');
  if (editInput) {
    editInput.focus();
    editInput.setSelectionRange(editInput.value.length, editInput.value.length);
    editInput.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { e.preventDefault(); cancelEdit(); }
    });
  }

  // Drag-and-drop sur les actions ouvertes
  attachReorder(listEl);
}

function renderTodoRow(item) {
  const isDone = item.status === 'done';
  const isEditing = item.id === EDITING_ID;

  if (isEditing) {
    return `
      <li class="todo todo--editing" data-id="${item.id}">
        <span class="todo__check ${isDone ? 'is-done' : ''}" aria-hidden="true">${isDone ? '✓' : ''}</span>
        <form class="todo__edit" data-id="${item.id}">
          <input class="todo__edit-input" type="text" value="${escapeHtml(item.title)}" maxlength="140" required>
          <div class="todo__edit-actions">
            <button type="submit" class="todo__edit-btn todo__edit-btn--save">Enregistrer</button>
            <button type="button" class="todo__edit-btn" data-act="cancel">Annuler</button>
            <button type="button" class="todo__edit-btn todo__edit-btn--danger" data-act="delete" data-id="${item.id}">Supprimer</button>
          </div>
        </form>
      </li>
    `;
  }

  return `
    <li class="todo ${isDone ? 'todo--done' : ''}" data-id="${item.id}">
      <button class="todo__check-btn" data-act="toggle" data-id="${item.id}" data-status="${item.status}" aria-label="${isDone ? 'Marquer à faire' : 'Marquer fait'}">
        <span class="todo__check ${isDone ? 'is-done' : ''}" aria-hidden="true">${isDone ? '✓' : ''}</span>
      </button>
      <button class="todo__title-btn" data-act="edit" data-id="${item.id}" aria-label="Modifier l'action">${escapeHtml(item.title)}</button>
    </li>
  `;
}

function startEdit(id) {
  EDITING_ID = id;
  paintTodos(CURRENT_TODOS);
}

function cancelEdit() {
  EDITING_ID = null;
  paintTodos(CURRENT_TODOS);
}

async function saveEdit(id, newTitle) {
  const title = newTitle.trim();
  if (!title) return;
  try {
    await updateDoc(doc(db, 'actions', id), { title });
    EDITING_ID = null;
    // Le snapshot va re-painter, mais on peut aussi forcer pour la fluidité
    const idx = CURRENT_TODOS.findIndex(t => t.id === id);
    if (idx >= 0) CURRENT_TODOS[idx] = { ...CURRENT_TODOS[idx], title };
    paintTodos(CURRENT_TODOS);
  } catch (err) { console.error(err); flashError(err.message); }
}

async function toggleTodo(id, currentStatus) {
  try {
    await updateDoc(doc(db, 'actions', id), {
      status: currentStatus === 'open' ? 'done' : 'open',
      doneAt: currentStatus === 'open' ? serverTimestamp() : null,
    });
  } catch (err) { console.error(err); flashError(err.message); }
}

async function deleteTodo(id) {
  if (!confirm('Supprimer cette action ?')) return;
  try {
    await deleteDoc(doc(db, 'actions', id));
    if (EDITING_ID === id) EDITING_ID = null;
  } catch (err) { console.error(err); flashError(err.message); }
}

// =========================================================
// DRAG-AND-DROP — réorganisation par long-press
// =========================================================
let DRAG = null;
const LONG_PRESS_MS = 450;
const PRESS_MOVE_TOLERANCE = 8;

function attachReorder(listEl) {
  // Seuls les items ouverts (non terminés, non en édition) sont déplaçables
  listEl.querySelectorAll('.todo:not(.todo--done):not(.todo--editing)').forEach(row => {
    row.addEventListener('pointerdown', (e) => onRowPointerDown(e, row));
  });
}

function onRowPointerDown(e, row) {
  if (DRAG) return;
  if (e.pointerType === 'mouse' && e.button !== 0) return;
  // Ne pas déclencher si on tape précisément la case ronde (toggle done)
  // ou un input / bouton du mode édition. Mais autoriser sur le titre (qui
  // occupe tout l'espace restant — sinon le drag ne se déclenche jamais).
  if (e.target.closest('.todo__check-btn, .todo__edit-btn, input, form')) return;

  const startX = e.clientX, startY = e.clientY;
  const pressTimer = setTimeout(() => activateDrag(row, startY), LONG_PRESS_MS);

  const cleanup = () => {
    clearTimeout(pressTimer);
    document.removeEventListener('pointermove', onPreMove);
    document.removeEventListener('pointerup', onPreUp);
    document.removeEventListener('pointercancel', onPreUp);
  };
  function onPreMove(ev) {
    if (Math.abs(ev.clientX - startX) > PRESS_MOVE_TOLERANCE ||
        Math.abs(ev.clientY - startY) > PRESS_MOVE_TOLERANCE) {
      cleanup();
    }
  }
  function onPreUp() { cleanup(); }
  document.addEventListener('pointermove', onPreMove);
  document.addEventListener('pointerup', onPreUp);
  document.addEventListener('pointercancel', onPreUp);
}

function activateDrag(row, startY) {
  if (navigator.vibrate) navigator.vibrate(18);
  document.body.classList.add('is-dragging-todo');
  row.classList.add('is-dragging');

  // Empêche le click qui suit le pointerup de déclencher l'édition
  const suppressClick = (ev) => {
    ev.stopPropagation();
    ev.preventDefault();
    document.removeEventListener('click', suppressClick, true);
  };
  document.addEventListener('click', suppressClick, true);
  setTimeout(() => document.removeEventListener('click', suppressClick, true), 1000);

  const ul = row.parentNode;
  const openRows = [...ul.querySelectorAll('.todo:not(.todo--done):not(.todo--editing)')];
  const initialIndex = openRows.indexOf(row);
  const rect = row.getBoundingClientRect();
  const rowHeight = rect.height;

  // Placeholder = la "trace" qui suit la position cible dans la liste
  const placeholder = document.createElement('li');
  placeholder.className = 'todo-placeholder';
  placeholder.style.height = rowHeight + 'px';
  ul.insertBefore(placeholder, row);

  // Row → position:fixed à sa coordonnée actuelle. Reste exactement
  // là où il était quand le long-press s'est déclenché — pas de saut.
  row.style.position = 'fixed';
  row.style.top = rect.top + 'px';
  row.style.left = rect.left + 'px';
  row.style.width = rect.width + 'px';
  row.style.margin = '0';
  row.style.zIndex = '50';

  DRAG = {
    row, ul, openRows, initialIndex,
    currentIndex: initialIndex,
    startY,
    startTop: rect.top,
    placeholder,
    rowHeight,
  };

  document.addEventListener('pointermove', onDragMove, { passive: false });
  document.addEventListener('pointerup', onDragEnd);
  document.addEventListener('pointercancel', onDragEnd);
}

function onDragMove(e) {
  if (!DRAG) return;
  e.preventDefault();
  const { row, openRows, startY, startTop, rowHeight, initialIndex, placeholder, ul } = DRAG;
  const dy = e.clientY - startY;
  // Le row reste pile sous le doigt (top fixe + delta)
  row.style.top = (startTop + dy) + 'px';

  // Calcul d'index cible
  const offset = Math.round(dy / rowHeight);
  const targetIndex = Math.max(0, Math.min(openRows.length - 1, initialIndex + offset));

  if (targetIndex !== DRAG.currentIndex) {
    DRAG.currentIndex = targetIndex;
    const refRow = openRows[targetIndex];
    if (targetIndex > initialIndex) {
      ul.insertBefore(placeholder, refRow.nextSibling);
    } else {
      ul.insertBefore(placeholder, refRow);
    }
  }
}

async function onDragEnd() {
  if (!DRAG) return;
  const { row, initialIndex, currentIndex, placeholder } = DRAG;
  const movedId = row.dataset.id;
  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup', onDragEnd);
  document.removeEventListener('pointercancel', onDragEnd);
  document.body.classList.remove('is-dragging-todo');
  row.classList.remove('is-dragging');
  row.style.position = '';
  row.style.top = '';
  row.style.left = '';
  row.style.width = '';
  row.style.margin = '';
  row.style.zIndex = '';
  row.style.transform = '';
  if (placeholder?.parentNode) placeholder.parentNode.removeChild(placeholder);
  const moved = initialIndex !== currentIndex;
  DRAG = null;
  if (moved) await persistOrder(movedId, currentIndex);
}

async function persistOrder(movedId, targetIndex) {
  const open = CURRENT_TODOS.filter(t => t.status !== 'done');
  const fromIdx = open.findIndex(t => t.id === movedId);
  if (fromIdx === -1) return;
  const moved = open[fromIdx];
  const newList = [...open];
  newList.splice(fromIdx, 1);
  newList.splice(targetIndex, 0, moved);

  const left  = targetIndex > 0                   ? newList[targetIndex - 1] : null;
  const right = targetIndex < newList.length - 1  ? newList[targetIndex + 1] : null;

  let newOrder;
  if (left && right) newOrder = (effectiveOrder(left) + effectiveOrder(right)) / 2;
  else if (left)     newOrder = effectiveOrder(left)  + 1;
  else if (right)    newOrder = effectiveOrder(right) - 1;
  else               newOrder = Date.now();

  try {
    await updateDoc(doc(db, 'actions', movedId), { order: newOrder });
  } catch (err) { console.error(err); flashError(err.message); }
}

function flashError(msg) {
  fbStatusEl.classList.add('is-error');
  fbStatusEl.title = msg;
  setTimeout(() => { fbStatusEl.classList.remove('is-error'); fbStatusEl.title = ''; }, 4000);
}

// =========================================================
// MOUNT
// =========================================================
function mount(html) {
  const app = document.getElementById('app');
  app.innerHTML = html;
}

// =========================================================
// BOOT
// =========================================================
if ('scrollRestoration' in history) history.scrollRestoration = 'manual';

(async function boot() {
  try {
    await loadData();
    route();
    fbPing();
    startActionsSubscription();
  } catch (e) {
    console.error(e);
    document.getElementById('app').innerHTML = `
      <div class="loader" style="color:var(--coral); flex-direction:column; gap:12px;">
        <div>Erreur de chargement</div>
        <div style="font-size:11px; opacity:0.6;">${escapeHtml(e.message)}</div>
      </div>`;
  }
})();

// Service Worker — cache offline pour usage en voyage
// Auto-reload de la page dès qu'un nouveau SW prend la main (post-skipWaiting + claim).
// Sans ça, l'app standalone iOS reste sur le shell mis en cache par l'ancien SW.
if ('serviceWorker' in navigator) {
  let reloadingForSwUpdate = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (reloadingForSwUpdate) return;
    reloadingForSwUpdate = true;
    window.location.reload();
  });
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
