function renderStays(match) {
  const focusId = match && match[1];
  const stays = Object.values(STATE.staysById);
  const totalNights = stays.reduce((s, x) => s + (x.nights || 0), 0);
  let confirmed = 0, paid = 0, toPay = 0;
  for (const s of stays) {
    if (s.status === 'confirmed') confirmed++;
    if (s.paymentBreakdown) {
      paid  += s.paymentBreakdown.paid      || 0;
      toPay += s.paymentBreakdown.remaining || 0;
    }
  }

  const cards = stays.map(renderStayPageCard).join('');

  mount(`
    <section class="page stays">
      <header class="stays__head">
        <a class="timeline__back" href="#/">Retour</a>
        <div class="timeline__kicker">Les hébergements</div>
        <h1 class="timeline__title">${totalNights} nuits,<br><em>${stays.length} étapes</em></h1>
        <dl class="stays__summary">
          <div>
            <dt>Réservés</dt>
            <dd>${confirmed}<small>/${stays.length}</small></dd>
          </div>
          <div>
            <dt>Payé</dt>
            <dd>${Math.round(paid)}<small> €</small></dd>
          </div>
          <div>
            <dt>À régler</dt>
            <dd>${Math.round(toPay)}<small> €</small></dd>
          </div>
        </dl>
      </header>

      <div class="stays__list">${cards}</div>
    </section>
  `);
  // Scroll dans le conteneur interne .stays (snap-container)
  const scrollToCard = () => {
    const el = document.getElementById('stay-card-' + focusId);
    const container = document.querySelector('.stays');
    if (!el || !container) return;
    container.scrollTo({ top: el.offsetTop, behavior: 'auto' });
    el.classList.add('stay-card--focused');
    setTimeout(() => el.classList.remove('stay-card--focused'), 1800);
  };
  if (focusId) {
    requestAnimationFrame(() => requestAnimationFrame(scrollToCard));
    setTimeout(scrollToCard, 600);
  } else {
    requestAnimationFrame(() => {
      const c = document.querySelector('.stays');
      if (c) c.scrollTo({ top: 0, behavior: 'auto' });
    });
  }
}

function renderStayPageCard(stay) {
  const isConfirmed = stay.status === 'confirmed';
  const cls = isConfirmed ? 'stay-card--confirmed' : 'stay-card--tbd';
  const dayN = dayForStay(stay.id);
  const nightsLabel = `${stay.nights} nuit${stay.nights > 1 ? 's' : ''}`;
  const statusLabel = isConfirmed ? 'Réservé' : 'À réserver';

  // Confirmés → photo de l'annonce (stay-<id>-...)
  // TBD → photo contextuelle de la ville (STAY_PHOTO mapping)
  let mobileSrc, heroSrc;
  if (isConfirmed && STAYS_WITH_REAL_PHOTO.has(stay.id)) {
    mobileSrc = `photos/stay-${stay.id}-mobile.jpg`;
    heroSrc   = `photos/stay-${stay.id}-hero.jpg`;
  } else {
    const photoKey = STAY_PHOTO[stay.id];
    mobileSrc = photoKey ? photoSrc(photoKey, 'mobile') : null;
    heroSrc   = photoKey ? photoSrc(photoKey, 'hero')   : null;
  }

  const listingPill = stay.listing && stay.listing.url ? (() => {
    const conf = ({
      airbnb:  { cls: 'is-airbnb',  text: 'Airbnb' },
      booking: { cls: 'is-booking', text: 'Booking' },
      website: { cls: 'is-website', text: 'Site' },
    })[stay.listing.type] || { cls: 'is-website', text: 'Annonce' };
    return `<a class="stay-card__listing ${conf.cls}" href="${escapeHtml(stay.listing.url)}" target="_blank" rel="noopener">${conf.text} ↗</a>`;
  })() : '';

  const photoHtml = mobileSrc ? `
    <figure class="stay-card__photo">
      <picture>
        <source media="(min-width: 768px)" srcset="${heroSrc}">
        <img src="${mobileSrc}" alt="" loading="lazy" decoding="async">
      </picture>
      <span class="stay-card__nights">${nightsLabel}</span>
      <span class="stay-card__status">${statusLabel}</span>
    </figure>` : '';

  const head = `
    <header class="stay-card__head">
      <div class="stay-card__city-row">
        <span class="stay-card__city">${escapeHtml(stay.city)} · ${escapeHtml(stay.country)}</span>
        ${listingPill}
      </div>
      <h2 class="stay-card__name">${escapeHtml(stay.name || 'À réserver')}</h2>
      <p class="stay-card__dates">${formatRange(stay.arrival, stay.departure)}</p>
    </header>
  `;

  let metaHtml = '';
  if (isConfirmed) {
    const meta = [];
    if (stay.checkin)  meta.push({ k: 'Check-in',  v: escapeHtml(stay.checkin) });
    if (stay.checkout) meta.push({ k: 'Check-out', v: escapeHtml(stay.checkout) });
    if (stay.host)     meta.push({ k: 'Hôte',      v: escapeHtml(stay.host) });
    if (stay.phone) {
      const tel = stay.phone.replace(/\s/g, '');
      meta.push({ k: 'Téléphone', v: `<a class="stay-card__link" href="tel:${escapeHtml(tel)}">${escapeHtml(stay.phone)}</a>` });
    }
    if (stay.address) {
      const dir = stay.coords
        ? `https://www.google.com/maps/dir/?api=1&destination=${stay.coords[0]},${stay.coords[1]}`
        : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(stay.address)}`;
      meta.push({
        k: 'Adresse',
        v: `<a class="stay-card__link stay-card__link-block" href="${escapeHtml(dir)}" target="_blank" rel="noopener">${escapeHtml(stay.address)}</a>`,
        full: true,
      });
    }
    if (meta.length) {
      metaHtml = `<dl class="stay-card__meta">${
        meta.map(d => `<div${d.full ? ' class="stay-card__meta-full"' : ''}><dt>${d.k}</dt><dd>${d.v}</dd></div>`).join('')
      }</dl>`;
    }
  }

  // Bouton « Réservation » → ouvre la bottom sheet avec le détail paiement
  let bookingBtnHtml = '';
  if (isConfirmed && (stay.price || stay.paymentBreakdown || stay.confirmation)) {
    const pb = stay.paymentBreakdown || {};
    const summary = [];
    if (stay.price) summary.push(`${Math.round(stay.price)} €`);
    if (pb.remaining > 0) summary.push(`${Math.round(pb.remaining)} € à régler`);
    else if (pb.paid > 0 && (!pb.remaining || pb.remaining === 0)) summary.push('payé');
    bookingBtnHtml = `
      <button type="button" class="stay-card__booking" data-act="open-booking" data-stay-id="${stay.id}">
        <span class="stay-card__booking-text">
          <span class="stay-card__booking-label">Réservation</span>
          <span class="stay-card__booking-summary">${summary.join(' · ') || 'Voir le détail'}</span>
        </span>
        <span class="stay-card__booking-arrow">→</span>
      </button>
    `;
  }
  const priceHtml = bookingBtnHtml;

  const notesHtml = stay.notes
    ? `<p class="stay-card__notes">${escapeHtml(stay.notes)}</p>`
    : '';

  // Plus de boutons d'action en bas : adresse + téléphone sont
  // cliquables inline, et le bouton annonce a migré dans la sheet
  // « Réservation » pour regrouper tout le contexte de la résa.
  const actionsHtml = '';

  return `
    <article class="stay-card ${cls}" id="stay-card-${stay.id}" data-stay-id="${stay.id}">
      <a class="stay-card__back" href="#/" aria-label="Retour à l'accueil">←</a>
      ${photoHtml}
      <div class="stay-card__body">
        ${head}
        ${metaHtml}
        ${notesHtml}
        ${priceHtml}
        ${actionsHtml}
      </div>
    </article>
  `;
}

function dayForStay(stayId) {
  const d = STATE.days.find(d => d.stay === stayId);
  return d ? d.n : 1;
}

// =========================================================
// BOTTOM SHEET RÉSERVATION
// =========================================================
let BOOKING_SHEET_ID = null;

function openBookingSheet(stayId) {
  BOOKING_SHEET_ID = stayId;
  paintBookingSheet();
}
function closeBookingSheet() {
  BOOKING_SHEET_ID = null;
  paintBookingSheet();
}
window.addEventListener('hashchange', closeBookingSheet);

function paintBookingSheet() {
  let el = document.getElementById('booking-sheet');
  if (!BOOKING_SHEET_ID) {
    if (el) {
      el.classList.add('is-closing');
      setTimeout(() => el.remove(), 220);
    }
    document.body.classList.remove('sheet-open');
    return;
  }
  const stay = STATE.staysById[BOOKING_SHEET_ID];
  if (!stay) return;
  if (!el) {
    el = document.createElement('div');
    el.id = 'booking-sheet';
    el.className = 'sheet-backdrop';
    document.body.appendChild(el);
  }

  const pb = stay.paymentBreakdown || {};
  const details = [];
  if (stay.confirmation) details.push(['Référence', stay.confirmation]);
  if (stay.bookedBy)     details.push(['Réservé par', stay.bookedBy]);
  if (stay.cancellation) details.push(['Annulation', stay.cancellation]);

  const payments = [];
  if (pb.paid && pb.paid > 0) {
    const note = [
      pb.paidDate ? formatDueDate(pb.paidDate) : null,
      pb.paymentMethod || null,
    ].filter(Boolean).join(' · ');
    payments.push(`
      <div class="sheet__payment is-paid">
        <span class="sheet__payment-icon">✓</span>
        <div>
          <div class="sheet__payment-main">${Math.round(pb.paid)} € payé</div>
          ${note ? `<small>${escapeHtml(note)}</small>` : ''}
        </div>
      </div>`);
  }
  if (pb.remaining && pb.remaining > 0) {
    const due = pb.remainingDue;
    const dueLabel = !due ? 'à payer'
      : due === 'sur place' ? 'à payer sur place'
      : /^\d{4}-\d{2}-\d{2}$/.test(due) ? formatDueDate(due)
      : due;
    payments.push(`
      <div class="sheet__payment is-due">
        <span class="sheet__payment-icon">⏳</span>
        <div>
          <div class="sheet__payment-main">${Math.round(pb.remaining)} € à régler</div>
          <small>${escapeHtml(dueLabel)}</small>
        </div>
      </div>`);
  }
  if (pb.extras) {
    payments.push(`
      <div class="sheet__payment is-info">
        <span class="sheet__payment-icon">ℹ︎</span>
        <div><div class="sheet__payment-main">${escapeHtml(pb.extras)}</div></div>
      </div>`);
  }

  el.innerHTML = `
    <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="sheet-title">
      <div class="sheet__handle-zone" data-act="sheet-handle"></div>
      <div class="sheet__handle"></div>
      <button class="sheet__close" type="button" data-act="sheet-close" aria-label="Fermer">×</button>
      <div class="sheet__head">
        <div class="sheet__kicker">Réservation</div>
        <h2 class="sheet__title" id="sheet-title">${escapeHtml(stay.name || stay.city)}</h2>
        <p class="sheet__sub">${escapeHtml(stay.city)} · ${formatRange(stay.arrival, stay.departure)} · ${stay.nights} nuit${stay.nights > 1 ? 's' : ''}</p>
      </div>
      ${details.length ? `<dl class="sheet__details">${details.map(([k, v]) => `<div><dt>${k}</dt><dd>${escapeHtml(v)}</dd></div>`).join('')}</dl>` : ''}
      ${stay.price ? `<div class="sheet__total"><span>Montant total</span><strong>${Math.round(stay.price)} €</strong></div>` : ''}
      ${payments.length ? `<div class="sheet__payments">${payments.join('')}</div>` : ''}
    </div>
  `;
  document.body.classList.add('sheet-open');
  el.addEventListener('click', (e) => {
    if (e.target === el || e.target.closest('[data-act="sheet-close"]')) closeBookingSheet();
  });
  document.addEventListener('keydown', escClose, { once: true });

  // Swipe-down sur la zone handle pour fermer
  const sheetEl = el.querySelector('.sheet');
  const handleZone = el.querySelector('[data-act="sheet-handle"]');
  if (sheetEl && handleZone) attachSheetSwipe(sheetEl, handleZone);
}

function attachSheetSwipe(sheet, handle) {
  let startY = null;
  let lastY = null;
  let lastTime = null;

  const onMove = (e) => {
    if (startY === null) return;
    const y = e.clientY;
    const dy = y - startY;
    if (dy > 0) sheet.style.transform = `translateY(${dy}px)`;
    lastY = y;
    lastTime = Date.now();
  };
  const onUp = (e) => {
    if (startY === null) return;
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    document.removeEventListener('pointercancel', onUp);
    const dy = e.clientY - startY;
    const h = sheet.getBoundingClientRect().height;
    const velocity = (e.clientY - lastY) / Math.max(1, Date.now() - lastTime); // px/ms
    startY = null;
    if (dy > h * 0.22 || velocity > 0.6) {
      sheet.style.transition = 'transform 200ms var(--ease)';
      sheet.style.transform = `translateY(${h}px)`;
      setTimeout(closeBookingSheet, 180);
    } else {
      sheet.style.transition = 'transform 220ms cubic-bezier(.2, .65, .2, 1)';
      sheet.style.transform = 'translateY(0)';
    }
  };
  handle.addEventListener('pointerdown', (e) => {
    startY = e.clientY;
    lastY = e.clientY;
    lastTime = Date.now();
    sheet.style.transition = 'none';
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
    document.addEventListener('pointercancel', onUp);
  });
}
function escClose(e) { if (e.key === 'Escape') closeBookingSheet(); }

// Délégation : tap sur le bouton « Réservation » d'une card
document.addEventListener('click', (e) => {
  const btn = e.target.closest('[data-act="open-booking"]');
  if (btn) {

    openBookingSheet(btn.dataset.stayId);
  }
});

// =========================================================
function paintNotes(dayN) {
  const container = document.querySelector(`.notes[data-day="${dayN}"]`);
  if (!container) return;
  const notes = NOTES_BY_DAY[dayN] || [];
  const isAddingNew = NOTE_EDITING_ID === `new:${dayN}`;

  const items = notes.map(n =>
    NOTE_EDITING_ID === n.id ? renderNoteEdit(n, dayN) : renderNoteRead(n)
  );
  if (isAddingNew) {
    items.push(renderNoteEdit({ id: `new:${dayN}`, text: '', dayN }, dayN));
  }

  let html = '';
  if (notes.length === 0 && !isAddingNew) {
    html += `<p class="notes__empty">Pas encore de note pour cette étape.</p>`;
  }
  html += items.join('');
  if (!isAddingNew) {
    html += `<button class="note-add" data-act="note-add" data-day="${dayN}">+ Ajouter une note</button>`;
  }
  container.innerHTML = html;
  attachNotesEvents(container, dayN);
}

function renderNoteRead(n) {
  const ts = n.updatedAt || n.createdAt;
  const stamp = formatNoteDate(ts);
  return `

      <div class="note__text">${escapeHtml(n.text || '').replace(/\n/g, '<br>')}</div>
      <footer class="note__meta">

        <button class="note__edit" data-act="note-edit" data-id="${n.id}" aria-label="Modifier">✎ Modifier</button>
      </footer>
    </article>
  `;
}

function renderNoteEdit(n, dayN) {
  const isNew = String(n.id).startsWith('new:');
  return `
    <form class="note note--editing" data-id="${n.id}" data-day="${dayN}">
      <textarea class="note__textarea" maxlength="2000" placeholder="Tape la note ici…">${escapeHtml(n.text || '')}</textarea>
      <div class="note__edit-actions">
        <button type="submit" class="note__btn note__btn--save">Enregistrer</button>
        <button type="button" class="note__btn" data-act="note-cancel">Annuler</button>
        ${isNew ? '' : `<button type="button" class="note__btn note__btn--danger" data-act="note-delete" data-id="${n.id}">Supprimer</button>`}
      </div>
    </form>
  `;
}

function attachNotesEvents(container, dayN) {
  container.querySelectorAll('[data-act="note-add"]').forEach(b =>
    b.addEventListener('click', () => { NOTE_EDITING_ID = `new:${dayN}`; paintNotes(dayN); })
  );
  container.querySelectorAll('[data-act="note-edit"]').forEach(b =>
    b.addEventListener('click', () => { NOTE_EDITING_ID = b.dataset.id; paintNotes(dayN); })
  );
  container.querySelectorAll('[data-act="note-cancel"]').forEach(b =>
    b.addEventListener('click', () => { NOTE_EDITING_ID = null; paintNotes(dayN); })
  );
  container.querySelectorAll('[data-act="note-delete"]').forEach(b =>
    b.addEventListener('click', () => deleteNote(b.dataset.id))
  );
  container.querySelectorAll('form.note--editing').forEach(f => {
    f.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = f.querySelector('textarea').value.trim();
      if (!text) return;
      saveNote(f.dataset.id, text, parseInt(f.dataset.day, 10));
    });
    const ta = f.querySelector('textarea');
    autoResizeTa(ta);
    ta.focus();
    ta.setSelectionRange(ta.value.length, ta.value.length);
    ta.addEventListener('input', () => autoResizeTa(ta));
    ta.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { e.preventDefault(); NOTE_EDITING_ID = null; paintNotes(dayN); }
    });
  });
}

function autoResizeTa(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.max(80, ta.scrollHeight) + 'px';
}

async function saveNote(id, text, dayN) {
  if (String(id).startsWith('new:')) {
    try {
      await addDoc(collection(db, 'notes'), {
        dayN: dayN,
        text,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp(),
      });
      NOTE_EDITING_ID = null;
    } catch (err) { console.error(err); flashError(err.message); }
  } else {
    try {
      await updateDoc(doc(db, 'notes', id), { text, updatedAt: serverTimestamp() });
      NOTE_EDITING_ID = null;
    } catch (err) { console.error(err); flashError(err.message); }
  }
  paintNotes(dayN);
}

async function deleteNote(id) {
  if (!confirm('Supprimer cette note ?')) return;
  try {
    await deleteDoc(doc(db, 'notes', id));
    if (NOTE_EDITING_ID === id) NOTE_EDITING_ID = null;
  } catch (err) { console.error(err); flashError(err.message); }
}

function formatNoteDate(ts) {
  if (!ts || typeof ts.toDate !== 'function') return 'à l\'instant';
  const d = ts.toDate();
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60)        return 'à l\'instant';
  if (diff < 3600)      return `il y a ${Math.floor(diff / 60)} min`;
  if (diff < 86400)     return `il y a ${Math.floor(diff / 3600)} h`;
  if (diff < 86400 * 7) return `il y a ${Math.floor(diff / 86400)} j`;
  return `${d.getDate()} ${MONTHS[d.getMonth()]}`;
}

// =========================================================
// PAGE CARTE — Leaflet + parsing KML local
// =========================================================
const LEAFLET_VER = '1.9.4';
let LEAFLET_LOADING = null;

function ensureLeaflet() {
  if (window.L) return Promise.resolve();
  if (LEAFLET_LOADING) return LEAFLET_LOADING;
  LEAFLET_LOADING = new Promise((resolve, reject) => {
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = `https://unpkg.com/leaflet@${LEAFLET_VER}/dist/leaflet.css`;
    document.head.appendChild(link);
    const script = document.createElement('script');
    script.src = `https://unpkg.com/leaflet@${LEAFLET_VER}/dist/leaflet.js`;
    script.onload = () => resolve();
    script.onerror = (e) => reject(new Error('Leaflet load failed'));
    document.head.appendChild(script);
  });
  return LEAFLET_LOADING;
}

async function loadKmlFeatures() {
  const resp = await fetch(KML_URL);
  if (!resp.ok) throw new Error('KML fetch ' + resp.status);
  const text = await resp.text();
  const xml = new DOMParser().parseFromString(text, 'text/xml');
  const features = { stays: [], pois: [], routes: [] };

  xml.querySelectorAll('Folder').forEach(folder => {
    const folderName = folder.querySelector(':scope > name')?.textContent || '';
    const isStays  = folderName.startsWith('Hébergements');
    const isPois   = folderName.startsWith('Sites');
    const isRoutes = folderName.startsWith('Itinéraire');

    folder.querySelectorAll('Placemark').forEach(pm => {
      const name = pm.querySelector(':scope > name')?.textContent.trim() || '';
      const description = pm.querySelector(':scope > description')?.textContent.trim() || '';
      const styleUrl = pm.querySelector(':scope > styleUrl')?.textContent.trim() || '';
      const point = pm.querySelector('Point > coordinates');
      const line  = pm.querySelector('LineString > coordinates');
      if (point) {
        const [lng, lat] = point.textContent.trim().split(',').map(parseFloat);
        const stayId = pm.querySelector('ExtendedData Data[name="stayId"] value')?.textContent?.trim() || null;
        const item = { name, description, styleUrl, lat, lng, stayId };
        if (isStays) features.stays.push(item);
        else if (isPois) features.pois.push(item);
      } else if (line && isRoutes) {
        const coords = line.textContent.trim().split(/\s+/).map(s => {
          const [lng, lat] = s.split(',').map(parseFloat);
          return [lat, lng];
        }).filter(c => Number.isFinite(c[0]) && Number.isFinite(c[1]));
        if (coords.length > 1) features.routes.push({ name, description, coords });
      }
    });
  });
  return features;
}

async function renderMap() {
  mount(`
    <section class="page map-view">
      <a class="map-back" href="#/">Retour</a>
      <a class="map-external" href="${MY_MAPS_URL}" target="_blank" rel="noopener" title="Ouvrir dans Google Maps">Google Maps ↗</a>
      <div id="leaflet-map" class="leaflet-map" aria-label="Carte du voyage">
        <div class="map-loader">Chargement de la carte…</div>
      </div>
    </section>
  `);

  try {
    const [_, features] = await Promise.all([ensureLeaflet(), loadKmlFeatures()]);
    const mapEl = document.getElementById('leaflet-map');
    if (!mapEl) return; // user a quitté
    mapEl.innerHTML = ''; // remove loader

    const map = L.map(mapEl, { zoomControl: false, attributionControl: true })
      .setView([45.7, 13.7], 6);
    L.control.zoom({ position: 'bottomleft' }).addTo(map);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 18,
    }).addTo(map);

    const all = L.featureGroup().addTo(map);

    // Routes en premier (pour qu'elles soient sous les marqueurs)
    features.routes.forEach(r => {
      L.polyline(r.coords, {
        color: '#d4a574', weight: 4, opacity: 0.85, lineJoin: 'round'
      }).bindPopup(`<b>${escapeHtml(r.name)}</b><br>${r.description || ''}`).addTo(all);
    });

    // POIs en orange (centres d'intérêt)
    features.pois.forEach(p => {
      L.circleMarker([p.lat, p.lng], {
        radius: 7, color: '#fbf6e9', weight: 1.5,
        fillColor: '#e98d58', fillOpacity: 0.92,
      }).bindPopup(renderPoiPopup(p), { maxWidth: 300, minWidth: 240, className: 'pop' }).addTo(all);
    });

    // Hébergements en vert avec lettre d'étape (A, B, C, … chronologique)
    const STAGE_LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    features.stays.forEach((s, i) => {
      const letter = STAGE_LETTERS[i] || '?';
      const isConfirmed = s.styleUrl.includes('confirmed');
      const icon = L.divIcon({
        className: 'stay-pin',
        html: `<div class="stay-pin__inner ${isConfirmed ? 'is-confirmed' : 'is-tbd'}">${letter}</div>`,
        iconSize: [32, 32],
        iconAnchor: [16, 16],
        popupAnchor: [0, -14],
      });
      const stayData = s.stayId ? STATE.staysById[s.stayId] : null;
      L.marker([s.lat, s.lng], { icon })
        .bindPopup(renderStayPopup(stayData, s, letter), { maxWidth: 320, minWidth: 280, className: 'pop' })
        .addTo(all);
    });

    // Géolocalisation utilisateur (cercle bleu + halo de précision)
    let userMarker = null, accCircle = null, watchId = null;
    if (navigator.geolocation) {
      const onPos = (pos) => {
        const ll = [pos.coords.latitude, pos.coords.longitude];
        if (!userMarker) {
          userMarker = L.circleMarker(ll, {
            radius: 8, color: '#ffffff', weight: 2,
            fillColor: '#1976d2', fillOpacity: 1,
          }).bindPopup('Ma position').addTo(map);
        } else {
          userMarker.setLatLng(ll);
        }
        if (pos.coords.accuracy && pos.coords.accuracy < 5000) {
          if (!accCircle) {
            accCircle = L.circle(ll, {
              radius: pos.coords.accuracy,
              color: '#1976d2', weight: 0,
              fillColor: '#1976d2', fillOpacity: 0.12,
            }).addTo(map);
          } else {
            accCircle.setLatLng(ll);
            accCircle.setRadius(pos.coords.accuracy);
          }
        }
      };
      const onErr = (err) => console.warn('Geolocation:', err.message);
      navigator.geolocation.getCurrentPosition(onPos, onErr, { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 });
      watchId = navigator.geolocation.watchPosition(onPos, onErr, { enableHighAccuracy: true, timeout: 15000, maximumAge: 30000 });
    }

    if (all.getLayers().length) {
      map.fitBounds(all.getBounds(), { padding: [40, 40] });
    }

    // Recalcul des dimensions Leaflet + cleanup géoloc à la sortie
    let ro = null;
    if (typeof ResizeObserver !== 'undefined') {
      ro = new ResizeObserver(() => map.invalidateSize());
      ro.observe(mapEl);
    }
    const onOrient = () => setTimeout(() => map.invalidateSize(), 200);
    window.addEventListener('orientationchange', onOrient);

    const cleanup = () => {
      if (ro) ro.disconnect();
      window.removeEventListener('orientationchange', onOrient);
      if (watchId != null && navigator.geolocation) {
        navigator.geolocation.clearWatch(watchId);
      }
      window.removeEventListener('hashchange', cleanup);
    };
    window.addEventListener('hashchange', cleanup);
  } catch (err) {
    console.error(err);
    const mapEl = document.getElementById('leaflet-map');
    if (mapEl) mapEl.innerHTML = `<div class="map-loader" style="color:var(--coral);">Erreur de chargement : ${escapeHtml(err.message)}</div>`;
  }
}

function dirUrl(lat, lng) {
  return `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
}

function renderStayPopup(stay, kmlItem, letter) {
  const lat = kmlItem.lat, lng = kmlItem.lng;
  const name = (stay && stay.name) || kmlItem.name.split('—').slice(1).join('—').trim() || kmlItem.name;
  const city = (stay && stay.city) || kmlItem.name.split('—')[0].trim();

  // Dates remontées dans le header (économise de la place dans le body)
  let dateLine = '';
  if (stay && stay.arrival && stay.departure) {
    dateLine = `${formatRange(stay.arrival, stay.departure)} · ${stay.nights} nuit${stay.nights > 1 ? 's' : ''}`;
  }

  const details = [];
  if (stay) {
    if (stay.checkin)  details.push({ k: 'Check-in',  v: escapeHtml(stay.checkin) });
    if (stay.checkout) details.push({ k: 'Check-out', v: escapeHtml(stay.checkout) });
    if (stay.phone) {
      const tel = stay.phone.replace(/\s/g, '');
      details.push({
        k: 'Téléphone',
        v: `<a class="pop-link" href="tel:${escapeHtml(tel)}">${escapeHtml(stay.phone)}</a>`,
      });
    }
    if (stay.address) {
      const dir = stay.coords
        ? `https://www.google.com/maps/dir/?api=1&destination=${stay.coords[0]},${stay.coords[1]}`
        : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(stay.address)}`;
      details.push({
        k: 'Adresse',
        v: `<a class="pop-link" href="${escapeHtml(dir)}" target="_blank" rel="noopener">${escapeHtml(stay.address)}</a>`,
        full: true,
      });
    }
  }
  const detailsHtml = details.map(d =>
    `<div class="pop-detail${d.full ? ' pop-detail--full' : ''}"><dt>${d.k}</dt><dd>${d.v}</dd></div>`
  ).join('');

  const notesHtml = stay && stay.notes ? `<p class="pop-notes">${escapeHtml(stay.notes)}</p>` : '';

  return `
    <div class="pop-card">
      <header class="pop-header">
        <div class="pop-stage-line">
          <span class="pop-stage">Étape ${letter}</span>
          ${dateLine ? `<span class="pop-stage-dates">${escapeHtml(dateLine)}</span>` : ''}
        </div>
        <h2 class="pop-name">${escapeHtml(name)}</h2>
        <div class="pop-city">${escapeHtml(city)}</div>
      </header>
      <div class="pop-body">
        ${detailsHtml ? `<dl class="pop-details">${detailsHtml}</dl>` : ''}
        ${notesHtml}
        ${stay && stay.id ? `<a class="pop-link-card" href="#/hebergements/${stay.id}">Voir la fiche complète →</a>` : ''}
      </div>
    </div>
  `;
}

function openActionSheet(actionId) {
  let el = document.getElementById('action-sheet');
  if (el) el.remove();
  const action = actionId ? CURRENT_TODOS.find(a => a.id === actionId) : null;
  const initialTitle = action ? action.title : '';
  const initialDesc  = action ? (action.description || '') : '';

  el = document.createElement('div');
  el.id = 'action-sheet';
  el.className = 'sheet-backdrop';
  document.body.appendChild(el);
  el.innerHTML = `
    <div class="sheet expense-sheet" role="dialog" aria-modal="true">
      <div class="sheet__handle-zone" data-act="sheet-handle"></div>
      <div class="sheet__handle"></div>
      <button class="sheet__close" type="button" data-act="action-close" aria-label="Fermer">×</button>
      <div class="sheet__head">
        <div class="sheet__kicker">${action ? 'Modifier l\'action' : 'Nouvelle action'}</div>
      </div>

          <span>Titre</span>
          <input type="text" name="title" maxlength="140" required value="${escapeHtml(initialTitle)}" placeholder="Ex : Réserver Vintgar en ligne">
        </label>
        <label class="expense-field">
          <span>Description (optionnel)</span>
          <textarea name="description" rows="3" maxlength="2000" placeholder="Détails, lien, contexte…">${escapeHtml(initialDesc)}</textarea>
        </label>
        <div class="expense-actions">
          <button type="submit" class="expense-btn expense-btn--save">${action ? 'Enregistrer' : 'Ajouter'}</button>
          ${action
            ? `<button type="button" class="expense-btn expense-btn--danger" data-act="action-delete">Supprimer</button>`
            : `<button type="button" class="expense-btn" data-act="action-close">Annuler</button>`}
        </div>
      </form>
    </div>
  `;
  document.body.classList.add('sheet-open');
  el.addEventListener('click', (e) => {
    if (e.target === el || e.target.closest('[data-act="action-close"]')) closeActionSheet();
  });
  el.querySelector('[data-act="action-delete"]')?.addEventListener('click', async () => {
    if (!action || !confirm('Supprimer cette action ?')) return;
    try { await deleteDoc(doc(db, 'actions', action.id)); closeActionSheet(); }
    catch (err) { console.error(err); flashError(err.message); }
  });
  el.querySelector('#action-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.currentTarget);
    const title = (fd.get('title') || '').toString().trim();
    const description = (fd.get('description') || '').toString().trim();
    if (!title) return;
    try {
      if (action) {
        await updateDoc(doc(db, 'actions', action.id), { title, description });
      } else {
        await addDoc(collection(db, 'actions'), {
          title, description, status: 'open', order: Date.now(),
          createdAt: serverTimestamp(), doneAt: null,
        });
      }
      closeActionSheet();
    } catch (err) { console.error(err); flashError(err.message); }
  });
  const sheetEl = el.querySelector('.sheet');
  const handleZone = el.querySelector('[data-act="sheet-handle"]');
  if (sheetEl && handleZone) attachSheetSwipeGeneric(sheetEl, handleZone, closeActionSheet);
  setTimeout(() => {
    const input = el.querySelector('input[name="title"]');
    if (input) {
      input.focus();
      if (action) input.setSelectionRange(input.value.length, input.value.length);
    }
  }, 100);
}
function closeActionSheet() {
  const el = document.getElementById('action-sheet');
  if (!el) return;
  el.classList.add('is-closing');
  document.body.classList.remove('sheet-open');
  setTimeout(() => el.remove(), 220);
}

let EXPENSES = [];

function startExpensesSubscription() {
  if (EXPENSES_UNSUB) return;
  EXPENSES_UNSUB = onSnapshot(collection(db, 'expenses'),
    (snap) => {
      EXPENSES = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      EXPENSES.sort((a, b) => {
        const am = a.createdAt?.toMillis?.() ?? 0;
        const bm = b.createdAt?.toMillis?.() ?? 0;
        return bm - am; // plus récent en haut
      });
      if (location.hash.startsWith('#/gestion/budget')) paintBudget();
    },
    (err) => { console.error(err); flashError('Sync budget : ' + err.code); }
  );
}

  { id: 'autre',       label: 'Autre',       icon: '✦', color: '#9aa9ab' },
];
const PAYERS = ['Rémi', 'Elsa'];

function paintBudget() {
  // Avances : paiements stays + dépenses manuelles
  const advances = { 'Rémi': 0, 'Elsa': 0 };
  for (const s of Object.values(STATE.staysById)) {
    const p = s.paymentBreakdown?.paid;
    if (p && p > 0 && PAYERS.includes(s.bookedBy)) {
      advances[s.bookedBy] += p;
    }
  }
  for (const e of EXPENSES) {
    if (e.kind === 'settlement') continue;
    if (PAYERS.includes(e.payer)) advances[e.payer] += (Number(e.amount) || 0);
  }
  const total = advances['Rémi'] + advances['Elsa'];
  let remiBalance = advances['Rémi'] - total / 2;
  // Si remiBalance > 0 → Elsa doit ce montant à Rémi

  // Paiements à venir par payeur (basés sur stays.bookedBy + remaining)
  const upcomingByPayer = { 'Rémi': 0, 'Elsa': 0 };
  for (const s of Object.values(STATE.staysById)) {
    const r = s.paymentBreakdown?.remaining;
    if (r && r > 0 && PAYERS.includes(s.bookedBy)) {
      upcomingByPayer[s.bookedBy] += r;
    }
  }
  const upcomingTotal = upcomingByPayer['Rémi'] + upcomingByPayer['Elsa'];
  const totalAtMaturity = total + upcomingTotal;
  let remiBalanceMaturity = (advances['Rémi'] + upcomingByPayer['Rémi']) - totalAtMaturity / 2;

  // Régularisations : transfert direct, n'entre dans aucun total mais décale le solde.
  // Elsa → Rémi : Elsa rembourse une partie de sa dette → remiBalance diminue.
  // Rémi → Elsa : symétrique → remiBalance augmente.
  for (const e of EXPENSES) {
    if (e.kind !== 'settlement') continue;
    const amt = Number(e.amount) || 0;
    if (e.from === 'Elsa') { remiBalance -= amt; remiBalanceMaturity -= amt; }
    else if (e.from === 'Rémi') { remiBalance += amt; remiBalanceMaturity += amt; }
  }

  const balanceText = (b) => {
    if (Math.abs(b) < 0.5) return `équilibré ✓`;
    if (b > 0) return `<span class="budget__balance-who">Elsa</span> doit <strong>${Math.round(b)} €</strong> à <span class="budget__balance-who">Rémi</span>`;
    return `<span class="budget__balance-who">Rémi</span> doit <strong>${Math.round(-b)} €</strong> à <span class="budget__balance-who">Elsa</span>`;
  };
  const evenNow = Math.abs(remiBalance) < 0.5;
  const evenMaturity = Math.abs(remiBalanceMaturity) < 0.5;
  const hasUpcoming = upcomingTotal > 0;
  const balanceCls = (evenNow && (!hasUpcoming || evenMaturity)) ? 'is-even' : 'is-due';
  const mainText = evenNow ? `Tout est équilibré ✓` : balanceText(remiBalance);
  const balanceLine = `
    <div class="budget__balance ${balanceCls}">
      <div class="budget__balance-main">${mainText}</div>
      ${hasUpcoming ? `<div class="budget__balance-future"><span class="budget__balance-future-label">à échéance</span> ${balanceText(remiBalanceMaturity)}</div>` : ''}
    </div>
  `;

  const renderAdvance = (name) => {
    const paid = advances[name];
    const upc = upcomingByPayer[name];
    const echeance = paid + upc;
    return `
      <div class="budget__advance">
        <div class="budget__advance-name">${name}</div>
        <div class="budget__advance-amount">${Math.round(paid)}<small> €</small></div>
        ${upc > 0
          ? `<div class="budget__advance-echeance">à échéance <strong>${Math.round(echeance)} €</strong></div>`
          : ''}
      </div>
    `;
  };

  document.getElementById('budget-summary').innerHTML = `
    <div class="budget__advances">
      ${renderAdvance('Rémi')}
      ${renderAdvance('Elsa')}
    </div>
    ${balanceLine}
    <div class="budget__total">Total payé&nbsp;: <strong>${Math.round(total)} €</strong></div>
    <div class="budget__total budget__total--upcoming">Total à échéance&nbsp;: <strong>${Math.round(totalAtMaturity)} €</strong></div>
  `;

  // Construit la liste unifiée : dépenses manuelles + paiements stays
  // (faits + à venir)
  const stayItems = [];
  for (const s of Object.values(STATE.staysById)) {
    const pb = s.paymentBreakdown;
    if (!pb) continue;
    if (pb.paid && pb.paid > 0) {
      stayItems.push({
        _kind: 'paid', _stayId: s.id,
        amount: pb.paid,
        label: s.name || s.city,
        category: 'hebergement',
        payer: s.bookedBy,
        date: pb.paidDate || s.arrival,
        _meta: pb.paymentMethod || '',
      });
    }
    if (pb.remaining && pb.remaining > 0) {
      const dueIso = pb.remainingDue && /^\d{4}-\d{2}-\d{2}$/.test(pb.remainingDue) ? pb.remainingDue : null;
      stayItems.push({
        _kind: 'upcoming', _stayId: s.id,
        amount: pb.remaining,
        label: s.name || s.city,
        category: 'hebergement',
        payer: s.bookedBy,
        date: dueIso || s.arrival,
        _dueLabel: dueIso ? formatDueDate(dueIso) : (pb.remainingDue || 'à payer'),
      });
    }
  }
  const manualItems = EXPENSES.map(e => ({ ...e, _kind: 'manual' }));
  const allItems = [...manualItems, ...stayItems].sort((a, b) => {
    const ad = a.date || '';
    const bd = b.date || '';
    return bd.localeCompare(ad);
  });

  const list = document.getElementById('budget-list');
  if (!allItems.length) {
    list.innerHTML = `<p class="budget__empty">Aucune dépense pour le moment.</p>`;
    return;
  }
  list.innerHTML = `
    <h2 class="budget__list-title">${allItems.length} ligne${allItems.length > 1 ? 's' : ''}</h2>
    <ul class="budget__items">
      ${allItems.map(renderExpenseItem).join('')}
    </ul>
  `;
  list.querySelectorAll('[data-act="edit-expense"]').forEach(b =>
    b.addEventListener('click', () => openExpenseSheet(b.dataset.id))
  );
  list.querySelectorAll('[data-act="open-stay-expense"]').forEach(b =>
    b.addEventListener('click', () => openStayExpenseSheet(b.dataset.stayId, b.dataset.kind))
  );
}

// Sheet d'info pour un paiement hébergement (read-only, lien vers la fiche)
function openStayExpenseSheet(stayId, kind) {
  let el = document.getElementById('stay-expense-sheet');
  if (el) el.remove();
  const stay = STATE.staysById[stayId];
  if (!stay) return;
  const pb = stay.paymentBreakdown || {};
  const isUpcoming = kind === 'upcoming';
  const amount = isUpcoming ? pb.remaining : pb.paid;
  const dateLabel = isUpcoming
    ? (pb.remainingDue && /^\d{4}-\d{2}-\d{2}$/.test(pb.remainingDue)
        ? formatDueDate(pb.remainingDue)
        : (pb.remainingDue || 'à payer'))
    : (pb.paidDate ? formatDueDate(pb.paidDate) : '');

  const details = [];
  details.push(['Montant', `${Math.round(amount || 0)} €`]);
  if (stay.bookedBy)  details.push(['Payeur', stay.bookedBy]);
  if (dateLabel)      details.push([isUpcoming ? 'Échéance' : 'Date', dateLabel]);
  if (!isUpcoming && pb.paymentMethod) details.push(['Moyen', pb.paymentMethod]);
  if (isUpcoming && pb.extras)         details.push(['Note', pb.extras]);

  el = document.createElement('div');
  el.id = 'stay-expense-sheet';
  el.className = 'sheet-backdrop';
  document.body.appendChild(el);
  el.innerHTML = `
    <div class="sheet" role="dialog" aria-modal="true">
      <div class="sheet__handle-zone" data-act="sheet-handle"></div>
      <div class="sheet__handle"></div>
      <button class="sheet__close" type="button" data-act="stay-exp-close" aria-label="Fermer">×</button>
      <div class="sheet__head">
        <div class="sheet__kicker">${isUpcoming ? 'Paiement à venir' : 'Paiement effectué'}</div>
        <h2 class="sheet__title">${escapeHtml(stay.name || stay.city)}</h2>
        <p class="sheet__sub">${escapeHtml(stay.city)} · ${formatRange(stay.arrival, stay.departure)}</p>
      </div>
      <dl class="sheet__details">
        ${details.map(([k, v]) => `<div><dt>${k}</dt><dd>${escapeHtml(v)}</dd></div>`).join('')}

      <a class="sheet__listing sheet__listing--website" href="#/hebergements/${stay.id}" data-act="stay-exp-go-card">Voir la fiche complète →</a>

  `;

  el.addEventListener('click', (e) => {

    if (e.target.closest('[data-act="stay-exp-go-card"]')) closeStayExpenseSheet();
  });
  const sheetEl = el.querySelector('.sheet');
  const handleZone = el.querySelector('[data-act="sheet-handle"]');
  if (sheetEl && handleZone) attachSheetSwipeGeneric(sheetEl, handleZone, closeStayExpenseSheet);
}

function renderExpenseItem(e) {
  const isSettlement = e._kind === 'manual' && e.kind === 'settlement';
  const dateStr = e.date ? formatExpenseDate(e.date) : '';

  if (isSettlement) {
    return `
      <li class="budget__item">
        <button class="budget__item-btn" data-act="edit-expense" data-id="${e.id}">
          <span class="budget__item-icon" style="background:#9aa9ab1f; color:#9aa9ab">⇄</span>
          <span class="budget__item-text">
            <span class="budget__item-label">Régularisation</span>
            <small>${escapeHtml(e.from || '?')} → ${escapeHtml(e.to || '?')} · ${dateStr}</small>
          </span>
          <span class="budget__item-amount">${Math.round(Number(e.amount) || 0)} €</span>
        </button>
      </li>
    `;
  }

  const cat = CATEGORIES.find(c => c.id === e.category) || CATEGORIES[4];
  const isUpcoming = e._kind === 'upcoming';
  const isStay     = e._kind === 'paid' || e._kind === 'upcoming';

  const meta = isUpcoming
    ? `${cat.label} · ${escapeHtml(e.payer || '?')} · à venir ${escapeHtml(e._dueLabel || '')}`
    : `${cat.label} · ${escapeHtml(e.payer || '?')} · ${dateStr}${e._meta ? ' · ' + escapeHtml(e._meta) : ''}`;

  const itemCls = `budget__item${isUpcoming ? ' budget__item--upcoming' : ''}`;
  const iconCls = `budget__item-icon${isUpcoming ? ' budget__item-icon--upcoming' : ''}`;

  if (isStay) {
    return `
      <li class="${itemCls}">
        <button class="budget__item-btn" data-act="open-stay-expense" data-stay-id="${e._stayId}" data-kind="${e._kind}">
          <span class="${iconCls}" style="${isUpcoming ? `--cat-color:${cat.color}` : `background:${cat.color}1f; color:${cat.color}`}">${cat.icon}</span>
          <span class="budget__item-text">
            <span class="budget__item-label">${escapeHtml(e.label)}</span>
            <small>${meta}</small>
          </span>
          <span class="budget__item-amount${isUpcoming ? ' budget__item-amount--upcoming' : ''}">${Math.round(Number(e.amount) || 0)} €</span>
        </button>
      </li>
    `;
  }

  return `
    <li class="${itemCls}">
      <button class="budget__item-btn" data-act="edit-expense" data-id="${e.id}">
        <span class="${iconCls}" style="background:${cat.color}1f; color:${cat.color}">${cat.icon}</span>
        <span class="budget__item-text">
          <span class="budget__item-label">${escapeHtml(e.label || cat.label)}</span>
          <small>${meta}</small>
        </span>
        <span class="budget__item-amount">${Math.round(Number(e.amount) || 0)} €</span>
      </button>
    </li>
  `;
}

function formatExpenseDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  if (isNaN(d.getTime())) return iso;
  return `${d.getDate()} ${MONTHS[d.getMonth()]}`;
}

// --- Bottom sheet d'ajout / édition d'une dépense ---
function openExpenseSheet(expenseId) {
  let el = document.getElementById('expense-sheet');
  if (el) el.remove();
  const expense = expenseId ? EXPENSES.find(x => x.id === expenseId) : null;
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
  const initial = expense || {
    kind: 'shared',
    amount: '', label: '', category: 'repas', payer: 'Rémi',
    from: 'Elsa', to: 'Rémi',
    date: todayStr,
  };
  const otherPayer = (p) => PAYERS.find(x => x !== p) || PAYERS[0];
  const initialKind = initial.kind === 'settlement' ? 'settlement' : 'shared';

  el = document.createElement('div');
  el.id = 'expense-sheet';
  el.className = 'sheet-backdrop';
  document.body.appendChild(el);
  el.innerHTML = `
    <div class="sheet expense-sheet" role="dialog" aria-modal="true">
      <div class="sheet__handle-zone" data-act="sheet-handle"></div>
      <div class="sheet__handle"></div>
      <button class="sheet__close" type="button" data-act="expense-close" aria-label="Fermer">×</button>
      <div class="sheet__head">
        <div class="sheet__kicker" data-kicker>${(expense ? 'Modifier' : 'Nouvelle') + ' ' + (initialKind === 'settlement' ? 'régularisation' : 'dépense')}</div>
      </div>
      <form class="expense-form" id="expense-form" data-kind="${initialKind}">
        <div class="expense-field">
          <span>Type</span>
          <div class="expense-chips" role="radiogroup">
            <button type="button" class="expense-chip ${initialKind === 'shared' ? 'is-active' : ''}" data-act="kind" data-id="shared">Dépense partagée</button>
            <button type="button" class="expense-chip ${initialKind === 'settlement' ? 'is-active' : ''}" data-act="kind" data-id="settlement">Régularisation</button>
          </div>
        </div>
        <label class="expense-field">
          <span>Montant</span>
          <input type="number" name="amount" step="0.01" min="0" inputmode="decimal" required value="${initial.amount}" placeholder="0">
        </label>
        <label class="expense-field" data-mode="shared">
          <span>Description</span>
          <input type="text" name="label" maxlength="80" placeholder="Petit-déjeuner, péage, musée…" value="${escapeHtml(initial.label || '')}">
        </label>
        <div class="expense-field" data-mode="shared">
          <span>Catégorie</span>
          <div class="expense-chips" role="radiogroup">
            ${CATEGORIES.map(c => `
              <button type="button" class="expense-chip ${initial.category === c.id ? 'is-active' : ''}" data-act="cat" data-id="${c.id}" style="--chip-color:${c.color}">
                <span>${c.icon}</span> ${c.label}
              </button>
            `).join('')}
          </div>
        </div>
        <div class="expense-field" data-mode="shared">
          <span>Payeur</span>
          <div class="expense-chips" role="radiogroup">
            ${PAYERS.map(p => `
              <button type="button" class="expense-chip ${initial.payer === p ? 'is-active' : ''}" data-act="payer" data-id="${p}">${p}</button>
            `).join('')}
          </div>
        </div>
        <div class="expense-field" data-mode="settlement">
          <span>De</span>
          <div class="expense-chips" role="radiogroup">
            ${PAYERS.map(p => `
              <button type="button" class="expense-chip ${(initial.from || 'Elsa') === p ? 'is-active' : ''}" data-act="from" data-id="${p}">${p}</button>
            `).join('')}
          </div>
          <small class="expense-field__hint">→ vers <strong data-settlement-to>${otherPayer(initial.from || 'Elsa')}</strong></small>
        </div>
        <label class="expense-field">
          <span>Date</span>
          <input type="date" name="date" value="${initial.date}">
        </label>
        <div class="expense-actions">
          <button type="submit" class="expense-btn expense-btn--save">${expense ? 'Enregistrer' : 'Ajouter'}</button>
          ${expense ? `<button type="button" class="expense-btn expense-btn--danger" data-act="expense-delete">Supprimer</button>` : `<button type="button" class="expense-btn" data-act="expense-close">Annuler</button>`}
        </div>
      </form>
    </div>
  `;

  // State + handlers
  let kind = initialKind;
  let category = initial.category;
  let payer = initial.payer;
  let from = initial.from || 'Elsa';
  const form = el.querySelector('#expense-form');
  const kicker = el.querySelector('[data-kicker]');
  const updateKicker = () => {
    if (kicker) kicker.textContent = (expense ? 'Modifier' : 'Nouvelle') + ' ' + (kind === 'settlement' ? 'régularisation' : 'dépense');
  };

  el.addEventListener('click', (e) => {
    if (e.target === el || e.target.closest('[data-act="expense-close"]')) closeExpenseSheet();
  });
  el.querySelectorAll('[data-act="kind"]').forEach(b =>
    b.addEventListener('click', () => {
      kind = b.dataset.id;
      form.setAttribute('data-kind', kind);
      el.querySelectorAll('[data-act="kind"]').forEach(x => x.classList.toggle('is-active', x.dataset.id === kind));
      updateKicker();
    })
  );
  el.querySelectorAll('[data-act="cat"]').forEach(b =>
    b.addEventListener('click', () => {
      category = b.dataset.id;
      el.querySelectorAll('[data-act="cat"]').forEach(x => x.classList.toggle('is-active', x.dataset.id === category));
    })
  );
  el.querySelectorAll('[data-act="payer"]').forEach(b =>
    b.addEventListener('click', () => {
      payer = b.dataset.id;
      el.querySelectorAll('[data-act="payer"]').forEach(x => x.classList.toggle('is-active', x.dataset.id === payer));
    })
  );
  el.querySelectorAll('[data-act="from"]').forEach(b =>
    b.addEventListener('click', () => {
      from = b.dataset.id;
      el.querySelectorAll('[data-act="from"]').forEach(x => x.classList.toggle('is-active', x.dataset.id === from));
      const toEl = el.querySelector('[data-settlement-to]');
      if (toEl) toEl.textContent = otherPayer(from);
    })
  );
  el.querySelector('[data-act="expense-delete"]')?.addEventListener('click', async () => {
    if (!expense) return;
    const msg = initialKind === 'settlement' ? 'Supprimer cette régularisation ?' : 'Supprimer cette dépense ?';
    if (!confirm(msg)) return;
    try { await deleteDoc(doc(db, 'expenses', expense.id)); closeExpenseSheet(); }
    catch (err) { console.error(err); flashError(err.message); }
  });
  el.querySelector('#expense-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.currentTarget);
    const amount = parseFloat(fd.get('amount'));
    const date = fd.get('date');
    if (!Number.isFinite(amount) || amount <= 0) return;
    let data;
    if (kind === 'settlement') {
      data = { kind: 'settlement', amount, from, to: otherPayer(from), date, updatedAt: serverTimestamp() };
    } else {
      const label = (fd.get('label') || '').toString().trim();
      data = { kind: 'shared', amount, label, category, payer, date, updatedAt: serverTimestamp() };
    }
    try {
      if (expense) {
        // setDoc plutôt qu'updateDoc : remplace entièrement → pas de champs orphelins quand le kind change.
        data.createdAt = expense.createdAt || serverTimestamp();
        await setDoc(doc(db, 'expenses', expense.id), data);
      } else {
        data.createdAt = serverTimestamp();
        await addDoc(collection(db, 'expenses'), data);
      }
      closeExpenseSheet();
    } catch (err) { console.error(err); flashError(err.message); }
  });

  document.body.classList.add('sheet-open');
  // Swipe-down (réutilise la mécanique existante)
  const sheetEl = el.querySelector('.sheet');
  const handleZone = el.querySelector('[data-act="sheet-handle"]');
  if (sheetEl && handleZone) attachSheetSwipeGeneric(sheetEl, handleZone, closeExpenseSheet);
}

function closeExpenseSheet() {
  const el = document.getElementById('expense-sheet');
  if (!el) return;
  el.classList.add('is-closing');
  document.body.classList.remove('sheet-open');
  setTimeout(() => el.remove(), 220);
}

function attachSheetSwipeGeneric(sheet, handle, onClose) {
  let startY = null, lastY = null, lastTime = null;
  const onMove = (e) => {
    if (startY === null) return;
    const dy = e.clientY - startY;
    if (dy > 0) sheet.style.transform = `translateY(${dy}px)`;
    lastY = e.clientY;
    lastTime = Date.now();
  };
  const onUp = (e) => {
    if (startY === null) return;
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    document.removeEventListener('pointercancel', onUp);
    const dy = e.clientY - startY;
    const h = sheet.getBoundingClientRect().height;
    const v = (e.clientY - lastY) / Math.max(1, Date.now() - lastTime);
    startY = null;
    if (dy > h * 0.22 || v > 0.6) {
      sheet.style.transition = 'transform 200ms var(--ease)';
      sheet.style.transform = `translateY(${h}px)`;
      setTimeout(onClose, 180);
    } else {
      sheet.style.transition = 'transform 220ms cubic-bezier(.2, .65, .2, 1)';
      sheet.style.transform = 'translateY(0)';
    }
  };
  handle.addEventListener('pointerdown', (e) => {
    startY = e.clientY; lastY = e.clientY; lastTime = Date.now();
    sheet.style.transition = 'none';
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
    document.addEventListener('pointercancel', onUp);
  });
}

      await addDoc(collection(db, 'actions'), {
        title,
        status: 'open',
        order: Date.now(),
        createdAt: serverTimestamp(),
        doneAt: null,
      });
    } catch (err) {
      console.error(err);
      input.value = title;
      flashError(err.message);
    } finally {
      input.disabled = false;
      input.focus();
    }
  });

  // Affichage initial à partir du cache local — la subscription globale
  // pousse les mises à jour suivantes.
  paintTodos(CURRENT_TODOS);
}

function effectiveOrder(item) {
  if (typeof item.order === 'number') return item.order;
  return item.createdAt?.toMillis?.() ?? 0;
}

function sortTodos(a, b) {
  const ad = a.status === 'done' ? 1 : 0;
  const bd = b.status === 'done' ? 1 : 0;
  if (ad !== bd) return ad - bd;
  return effectiveOrder(a) - effectiveOrder(b);
}

let CURRENT_TODOS = [];
let EDITING_ID = null;

function paintTodos(items) {
  CURRENT_TODOS = items;
  const open = items.filter(i => i.status !== 'done');
  const done = items.filter(i => i.status === 'done');
  const counter = document.getElementById('todos-counter');
  if (counter) {
    counter.textContent =
      open.length === 0
        ? (done.length ? `tout est fait` : `aucune pour l'instant`)
        : `${open.length} ouverte${open.length > 1 ? 's' : ''}`;
  }
  // Stats cards (page Gestion / onglet À faire)
  const statsEl = document.getElementById('todos-stats');
  if (statsEl) {
    statsEl.innerHTML = `
      <div class="budget__advances">
        <div class="budget__advance">
          <div class="budget__advance-name">Ouvertes</div>
          <div class="budget__advance-amount">${open.length}</div>
        </div>
        <div class="budget__advance">
          <div class="budget__advance-name">Faites</div>
          <div class="budget__advance-amount">${done.length}</div>
        </div>
      </div>
      <div class="budget__total">Total&nbsp;: <strong>${items.length} action${items.length > 1 ? 's' : ''}</strong></div>
    `;
  }

  const listEl = document.getElementById('todos-list');
  if (!open.length && !done.length) {
    listEl.innerHTML = `<p class="todos__empty">Rien à faire pour le moment.</p>`;
  } else {
    listEl.innerHTML = `
      <ul class="todos__group">
        ${open.map(renderTodoRow).join('')}
        ${done.map(renderTodoRow).join('')}
      </ul>
    `;
  }

  // Toggle (case ronde uniquement)
  listEl.querySelectorAll('[data-act="toggle"]').forEach(b =>
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleTodo(b.dataset.id, b.dataset.status);
    })
  );
  // Edit (clic sur le titre) → ouvre la sheet d'édition
  listEl.querySelectorAll('[data-act="edit"]').forEach(b =>
    b.addEventListener('click', () => openActionSheet(b.dataset.id))
  );
  // Entrée en mode reorder via le bouton ⋮
  listEl.querySelectorAll('[data-act="enter-reorder"]').forEach(b =>
    b.addEventListener('click', () => enterReorderMode(b.dataset.id))
  );
  // Reorder mode : monter / descendre / terminer
  listEl.querySelectorAll('[data-act="move-up"]').forEach(b =>
    b.addEventListener('click', () => moveAction(b.dataset.id, -1))
  );
  listEl.querySelectorAll('[data-act="move-down"]').forEach(b =>
    b.addEventListener('click', () => moveAction(b.dataset.id, +1))
  );
  listEl.querySelectorAll('[data-act="reorder-done"]').forEach(b =>
    b.addEventListener('click', exitReorderMode)
  );
}

function renderTodoRow(item) {
  const isDone = item.status === 'done';
  const isReordering = item.id === REORDER_ID;

  if (isReordering) {
    const open = CURRENT_TODOS.filter(t => t.status !== 'done');
    const idx = open.findIndex(t => t.id === item.id);
    const isFirst = idx <= 0;
    const isLast  = idx >= open.length - 1;
    return `
      <li class="todo todo--reorder" data-id="${item.id}">
        <span class="todo__check" aria-hidden="true"></span>
        <span class="todo__title-static">${escapeHtml(item.title)}</span>
        <div class="todo__reorder">
          <button class="todo__reorder-btn" data-act="move-up" data-id="${item.id}" ${isFirst ? 'disabled' : ''} aria-label="Monter">↑</button>
          <button class="todo__reorder-btn" data-act="move-down" data-id="${item.id}" ${isLast  ? 'disabled' : ''} aria-label="Descendre">↓</button>
          <button class="todo__reorder-btn todo__reorder-btn--ok" data-act="reorder-done" aria-label="Terminer">✓</button>
        </div>
      </li>
    `;
  }

  return `
    <li class="todo ${isDone ? 'todo--done' : ''}" data-id="${item.id}">
      <button class="todo__check-btn" data-act="toggle" data-id="${item.id}" data-status="${item.status}" aria-label="${isDone ? 'Marquer à faire' : 'Marquer fait'}">
        <span class="todo__check ${isDone ? 'is-done' : ''}" aria-hidden="true">${isDone ? '✓' : ''}</span>
      </button>
      <button class="todo__title-btn" data-act="edit" data-id="${item.id}" aria-label="Modifier l'action">${escapeHtml(item.title)}</button>
      ${!isDone ? `<button class="todo__reorder-toggle" data-act="enter-reorder" data-id="${item.id}" aria-label="Réorganiser">⋮</button>` : ''}
    </li>
  `;
}

function startEdit(id) {
  EDITING_ID = id;
  paintTodos(CURRENT_TODOS);
}

function cancelEdit() {
  EDITING_ID = null;
  paintTodos(CURRENT_TODOS);
}

async function saveEdit(id, newTitle) {
  const title = newTitle.trim();
  if (!title) return;
  try {
    await updateDoc(doc(db, 'actions', id), { title });
    EDITING_ID = null;
    // Le snapshot va re-painter, mais on peut aussi forcer pour la fluidité
    const idx = CURRENT_TODOS.findIndex(t => t.id === id);
    if (idx >= 0) CURRENT_TODOS[idx] = { ...CURRENT_TODOS[idx], title };
    paintTodos(CURRENT_TODOS);
  } catch (err) { console.error(err); flashError(err.message); }
}

async function toggleTodo(id, currentStatus) {
  const newStatus = currentStatus === 'open' ? 'done' : 'open';
  // Optimiste : on met à jour CURRENT_TODOS et on repaint, sans attendre Firestore
  const idx = CURRENT_TODOS.findIndex(t => t.id === id);
  if (idx >= 0) {
    CURRENT_TODOS[idx] = {
      ...CURRENT_TODOS[idx],
      status: newStatus,
      doneAt: newStatus === 'done' ? new Date() : null,
    };
    CURRENT_TODOS.sort(sortTodos);
    OPEN_ACTIONS_COUNT = CURRENT_TODOS.filter(t => t.status !== 'done').length;
    updateActionsBadge();
    paintTodos(CURRENT_TODOS);
  }
  // Persiste en arrière-plan
  updateDoc(doc(db, 'actions', id), {
    status: newStatus,
    doneAt: newStatus === 'done' ? serverTimestamp() : null,
  }).catch(err => { console.error(err); flashError(err.message); });
}

async function deleteTodo(id) {
  if (!confirm('Supprimer cette action ?')) return;
  try {
    await deleteDoc(doc(db, 'actions', id));
    if (EDITING_ID === id) EDITING_ID = null;
  } catch (err) { console.error(err); flashError(err.message); }
}

// =========================================================
// REORDER MODE — bouton ⋮ → mode flèches ↑ ↓ ✓
// =========================================================
let REORDER_ID = null;

function enterReorderMode(id) {
  if (navigator.vibrate) navigator.vibrate(15);
  REORDER_ID = id;
  paintTodos(CURRENT_TODOS);
}

function exitReorderMode() {
  REORDER_ID = null;
  paintTodos(CURRENT_TODOS);
}

async function moveAction(id, direction) {
  // direction = -1 (up) ou +1 (down)
  const open = CURRENT_TODOS.filter(t => t.status !== 'done');
  const idx = open.findIndex(t => t.id === id);
  if (idx === -1) return;
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= open.length) return;

  // Calcul du nouvel order (insertion sparse entre les voisins)
  const reordered = [...open];
  const [moved] = reordered.splice(idx, 1);
  reordered.splice(newIdx, 0, moved);
  const left  = newIdx > 0                       ? reordered[newIdx - 1] : null;
  const right = newIdx < reordered.length - 1    ? reordered[newIdx + 1] : null;
  let newOrder;
  if (left && right) newOrder = (effectiveOrder(left) + effectiveOrder(right)) / 2;
  else if (left)     newOrder = effectiveOrder(left)  + 1;
  else if (right)    newOrder = effectiveOrder(right) - 1;
  else               newOrder = Date.now();

  // Optimiste : on met à jour CURRENT_TODOS et on repaint, sans attendre Firestore
  const allIdx = CURRENT_TODOS.findIndex(t => t.id === id);
  if (allIdx >= 0) CURRENT_TODOS[allIdx] = { ...CURRENT_TODOS[allIdx], order: newOrder };
  CURRENT_TODOS.sort(sortTodos);
  paintTodos(CURRENT_TODOS);

  // Persiste en arrière-plan
  updateDoc(doc(db, 'actions', id), { order: newOrder }).catch(err => {
    console.error(err);
    flashError(err.message);
  });
}

function flashError(msg) {
  console.warn('flashError:', msg);
}

// =========================================================
// MOUNT
// =========================================================
function mount(html) {
  const app = document.getElementById('app');
  app.innerHTML = html;
}

// =========================================================
// BOOT
// =========================================================
if ('scrollRestoration' in history) history.scrollRestoration = 'manual';

(async function boot() {
  try {
    await loadData();
    route();
    fbPing();
    startActionsSubscription();
    startNotesSubscription();
    startExpensesSubscription();
  } catch (e) {
    console.error(e);
    document.getElementById('app').innerHTML = `
      <div class="loader" style="color:var(--coral); flex-direction:column; gap:12px;">
        <div>Erreur de chargement</div>
        <div style="font-size:11px; opacity:0.6;">${escapeHtml(e.message)}</div>
      </div>`;
  }
})();

// Service Worker — cache offline pour usage en voyage
// Auto-reload de la page dès qu'un nouveau SW prend la main (post-skipWaiting + claim).
// Sans ça, l'app standalone iOS reste sur le shell mis en cache par l'ancien SW.
if ('serviceWorker' in navigator) {
  let reloadingForSwUpdate = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (reloadingForSwUpdate) return;
    reloadingForSwUpdate = true;
    window.location.reload();
  });
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
